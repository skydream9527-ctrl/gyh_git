<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE-DATA-WORK · Agent 框架交互解读</title>
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #fffaf0;
    --surface-2: #f6efe2;
    --ink: #171717;
    --text: #2f302c;
    --muted: #777366;
    --line: #ded5c3;
    --panel: #111513;
    --panel-2: #181f1b;
    --panel-text: #f6f2e8;
    --panel-muted: #9aa59d;
    --mint: #2ed3b7;
    --green: #24a46d;
    --amber: #d99a19;
    --oxide: #b45236;
    --red: #c84133;
    --blue: #3f77b5;
    --shadow: 0 18px 60px rgba(31, 27, 18, .14);
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --serif: "Songti SC", "Noto Serif CJK SC", Georgia, serif;
    --sidebar-w: 280px;
    --inspector-w: 316px;
  }

  [data-theme="dark"] {
    --bg: #0c0e0c;
    --surface: #151814;
    --surface-2: #1d211b;
    --ink: #f7f4ea;
    --text: #e0ded4;
    --muted: #9a988d;
    --line: #2d332b;
    --panel: #090b0a;
    --panel-2: #121713;
    --panel-text: #f7f4ea;
    --panel-muted: #8d988f;
    --shadow: 0 24px 80px rgba(0, 0, 0, .42);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(circle at 70% -10%, rgba(46, 211, 183, .16), transparent 30%),
      linear-gradient(135deg, rgba(180, 82, 54, .08), transparent 34%),
      var(--bg);
    overflow: hidden;
    line-height: 1.55;
  }
  button, input, textarea { font: inherit; }
  button { color: inherit; }
  a { color: inherit; }
  .app { display: grid; grid-template-columns: var(--sidebar-w) minmax(0, 1fr) var(--inspector-w); height: 100vh; }
  body.sidebar-collapsed .app { grid-template-columns: 0 minmax(0, 1fr) var(--inspector-w); }
  body.inspector-collapsed .app { grid-template-columns: var(--sidebar-w) minmax(0, 1fr) 0; }
  body.focus-mode .app { grid-template-columns: 0 minmax(0, 1fr) 0; }

  .sidebar, .inspector {
    min-width: 0;
    overflow: hidden;
    background: var(--panel);
    color: var(--panel-text);
    border-color: rgba(255,255,255,.08);
    transition: opacity .22s ease, transform .22s ease;
  }
  body.sidebar-collapsed .sidebar, body.focus-mode .sidebar { opacity: 0; transform: translateX(-16px); pointer-events: none; }
  body.inspector-collapsed .inspector, body.focus-mode .inspector { opacity: 0; transform: translateX(16px); pointer-events: none; }
  .sidebar-inner, .inspector-inner { height: 100%; overflow-y: auto; padding: 18px 16px 22px; }
  .sidebar { border-right: 1px solid rgba(255,255,255,.08); }
  .inspector { border-left: 1px solid rgba(255,255,255,.08); }
  .brand { display: flex; gap: 12px; align-items: center; padding: 2px 0 16px; }
  .mark { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(145deg, #2ed3b7, #f2b23b); color: #06110e; font-weight: 900; letter-spacing: -.03em; }
  .brand b { display: block; font-size: 15px; line-height: 1.2; }
  .brand span { display: block; margin-top: 3px; color: var(--panel-muted); font-size: 12px; }
  .search { position: relative; margin: 10px 0 18px; }
  .search input { width: 100%; height: 38px; border: 1px solid rgba(255,255,255,.12); border-radius: 10px; background: rgba(255,255,255,.05); color: var(--panel-text); padding: 0 12px 0 34px; outline: none; }
  .search input:focus { border-color: rgba(46,211,183,.64); box-shadow: 0 0 0 3px rgba(46,211,183,.12); }
  .search:before { content: "⌕"; position: absolute; left: 12px; top: 7px; color: var(--panel-muted); }
  .tree-group { margin: 15px 0 6px; color: var(--panel-muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
  .nav-item { width: 100%; display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 8px; min-height: 34px; padding: 7px 9px; border: 0; border-radius: 9px; background: transparent; color: #cbd4ce; text-align: left; cursor: pointer; }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: rgba(46,211,183,.14); color: #fff; box-shadow: inset 2px 0 0 var(--mint); }
  .nav-index { font-family: var(--mono); font-size: 11px; color: var(--panel-muted); }
  .nav-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .nav-tag { font-size: 10px; color: #121510; background: var(--mint); border-radius: 999px; padding: 1px 6px; opacity: .95; }
  .sidebar-foot { margin-top: 18px; padding: 12px; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; color: var(--panel-muted); font-size: 12px; background: rgba(255,255,255,.035); }

  .workspace { min-width: 0; display: grid; grid-template-rows: 50px minmax(0, 1fr) 58px; height: 100vh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--line); background: rgba(255,250,240,.78); backdrop-filter: blur(18px); padding: 0 16px; }
  [data-theme="dark"] .topbar { background: rgba(21,24,20,.78); }
  .crumbs { display: flex; align-items: center; gap: 8px; min-width: 0; color: var(--muted); font-size: 13px; }
  .crumbs strong { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon-btn, .tool-btn { border: 1px solid var(--line); background: var(--surface); border-radius: 9px; min-width: 36px; height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 0 10px; cursor: pointer; box-shadow: 0 1px 0 rgba(0,0,0,.02); }
  .icon-btn:hover, .tool-btn:hover { border-color: rgba(46,211,183,.7); color: var(--ink); }
  .tool-btn { font-size: 13px; color: var(--text); }
  .toolbar { display: flex; align-items: center; gap: 8px; }

  .stage { min-height: 0; overflow: hidden; position: relative; padding: 24px; }
  .slide-shell { height: 100%; display: grid; place-items: center; }
  .slide {
    width: min(1080px, 100%);
    height: min(690px, calc(100vh - 154px));
    min-height: 500px;
    background:
      linear-gradient(90deg, rgba(23,23,23,.035) 1px, transparent 1px),
      linear-gradient(180deg, rgba(23,23,23,.035) 1px, transparent 1px),
      var(--surface);
    background-size: 38px 38px;
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
  }
  [data-theme="dark"] .slide { background-image: linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(180deg, rgba(255,255,255,.045) 1px, transparent 1px); }
  .slide-head { padding: 28px 34px 18px; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: start; }
  .kicker { color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .slide h1 { margin: 0; font-family: var(--serif); font-size: clamp(30px, 4.3vw, 54px); line-height: 1.06; letter-spacing: 0; color: var(--ink); }
  .slide h2 { margin: 0; font-size: clamp(24px, 3vw, 38px); line-height: 1.16; letter-spacing: 0; color: var(--ink); }
  .slide-lead { margin: 12px 0 0; max-width: 820px; color: var(--muted); font-size: 16px; }
  .slide-no { font-family: var(--mono); color: var(--muted); font-size: 20px; }
  .slide-body { min-height: 0; overflow: auto; padding: 24px 34px 34px; }
  .slide-body::-webkit-scrollbar, .sidebar-inner::-webkit-scrollbar, .inspector-inner::-webkit-scrollbar { width: 6px; height: 6px; }
  .slide-body::-webkit-scrollbar-thumb, .sidebar-inner::-webkit-scrollbar-thumb, .inspector-inner::-webkit-scrollbar-thumb { background: rgba(125,118,95,.36); border-radius: 999px; }

  .grid { display: grid; gap: 14px; }
  .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .card { border: 1px solid var(--line); background: rgba(255,255,255,.54); border-radius: 10px; padding: 15px 16px; }
  [data-theme="dark"] .card { background: rgba(255,255,255,.035); }
  .card h3 { margin: 0 0 7px; color: var(--ink); font-size: 16px; }
  .card p { margin: 0; color: var(--muted); font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 20px; }
  .stat { border-top: 3px solid var(--mint); background: rgba(46,211,183,.08); padding: 12px 14px; border-radius: 10px; }
  .stat b { display: block; color: var(--ink); font-size: 24px; line-height: 1; }
  .stat span { display: block; margin-top: 7px; color: var(--muted); font-size: 12px; }
  .flow { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
  .step { display: inline-flex; align-items: center; min-height: 34px; border: 1px solid var(--line); border-radius: 9px; padding: 6px 11px; background: var(--surface-2); color: var(--ink); font-weight: 650; font-size: 13px; }
  .arrow { color: var(--muted); font-weight: 900; }
  .pill { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 800; letter-spacing: .02em; background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); }
  .pill.mint { color: #073a31; background: rgba(46,211,183,.78); border-color: transparent; }
  .pill.amber { color: #3e2900; background: rgba(217,154,25,.78); border-color: transparent; }
  .pill.red { color: #fff; background: var(--red); border-color: transparent; }
  .note { margin: 14px 0; border-left: 4px solid var(--amber); background: rgba(217,154,25,.11); padding: 12px 14px; border-radius: 0 10px 10px 0; color: var(--text); }
  .note.info { border-left-color: var(--blue); background: rgba(63,119,181,.12); }
  .note.ok { border-left-color: var(--green); background: rgba(36,164,109,.12); }
  .note.danger { border-left-color: var(--red); background: rgba(200,65,51,.12); }
  .mono, code { font-family: var(--mono); font-size: .92em; }
  code { background: rgba(23,23,23,.08); border: 1px solid var(--line); border-radius: 6px; padding: 1px 5px; }
  pre { margin: 14px 0; padding: 16px 18px; background: #111513; color: #dfe8e0; border-radius: 12px; overflow: auto; font-family: var(--mono); font-size: 13px; line-height: 1.55; border: 1px solid rgba(255,255,255,.08); }
  pre .c { color: #8e9b92; }
  pre .k { color: #70d8c4; }
  pre .m { color: #f0bd45; }
  pre .d { color: #ff8172; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13.5px; }
  th, td { border-bottom: 1px solid var(--line); padding: 10px 10px; vertical-align: top; text-align: left; }
  th { color: var(--muted); font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
  td:first-child { color: var(--ink); font-weight: 750; }
  ul { margin: 10px 0; padding-left: 20px; }
  li { margin: 7px 0; }
  .timeline { border-left: 2px solid var(--line); padding-left: 18px; margin: 12px 0; }
  .time-row { position: relative; padding: 0 0 15px; }
  .time-row:before { content: ""; position: absolute; left: -25px; top: 4px; width: 11px; height: 11px; border: 3px solid var(--mint); background: var(--surface); border-radius: 50%; }
  .time-row.gate:before { border-color: var(--amber); }
  .time-row.stop:before { border-color: var(--red); }
  .time-row b { color: var(--ink); }
  .time-row p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
  .sim { display: grid; grid-template-columns: minmax(0, 1fr) 210px; gap: 16px; align-items: stretch; margin-top: 14px; }
  .sim-track { border: 1px solid var(--line); border-radius: 12px; padding: 16px; background: rgba(46,211,183,.06); }
  .sim-nodes { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sim-node { min-width: 86px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); text-align: center; font-weight: 800; }
  .sim-node.active { background: rgba(46,211,183,.18); color: var(--ink); border-color: rgba(46,211,183,.8); box-shadow: 0 0 0 3px rgba(46,211,183,.12); }
  .sim-log { margin-top: 12px; color: var(--muted); min-height: 40px; font-size: 13px; }
  .sandbox { border: 1px solid var(--line); border-radius: 12px; padding: 14px; background: rgba(255,255,255,.45); }
  [data-theme="dark"] .sandbox { background: rgba(255,255,255,.035); }
  .range-row { display: grid; grid-template-columns: 96px 1fr 36px; align-items: center; gap: 10px; margin: 9px 0; font-size: 13px; }
  input[type="range"] { width: 100%; accent-color: var(--mint); }
  .meter { height: 12px; border-radius: 999px; overflow: hidden; background: var(--surface-2); border: 1px solid var(--line); margin-top: 10px; }
  .meter span { display: block; height: 100%; width: 50%; background: linear-gradient(90deg, var(--mint), var(--amber)); }

  .bottom { display: grid; grid-template-columns: 160px 1fr 160px; align-items: center; gap: 16px; border-top: 1px solid var(--line); background: rgba(255,250,240,.74); backdrop-filter: blur(18px); padding: 0 18px; }
  [data-theme="dark"] .bottom { background: rgba(21,24,20,.74); }
  .pager { display: flex; gap: 8px; }
  .progress { height: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; border: 1px solid var(--line); }
  .progress span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--mint), var(--amber), var(--oxide)); transition: width .2s ease; }
  .hint { justify-self: end; color: var(--muted); font-size: 12px; }

  .inspector h3 { margin: 6px 0 8px; font-size: 16px; }
  .inspector .meta { color: var(--panel-muted); font-size: 12px; margin-bottom: 14px; }
  .takeaways { display: grid; gap: 8px; margin-bottom: 18px; }
  .takeaway { border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); border-radius: 10px; padding: 10px 11px; font-size: 13px; color: #d8e0da; }
  .comment-box { border-top: 1px solid rgba(255,255,255,.1); padding-top: 15px; }
  .comment-box textarea, .comment-box input { width: 100%; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); color: var(--panel-text); border-radius: 9px; outline: none; padding: 9px 10px; margin-bottom: 8px; }
  .comment-box textarea { resize: vertical; min-height: 82px; }
  .comment-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .comment-list { display: grid; gap: 8px; margin-top: 12px; }
  .comment { border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 9px 10px; background: rgba(255,255,255,.035); }
  .comment b { display: block; font-size: 12px; color: #fff; }
  .comment p { margin: 4px 0 0; color: #c9d1ca; font-size: 12px; }
  .comment time { color: var(--panel-muted); font-size: 11px; }
  .ghost { border: 1px solid rgba(255,255,255,.12); color: var(--panel-text); background: rgba(255,255,255,.05); border-radius: 9px; height: 32px; padding: 0 10px; cursor: pointer; }
  .ghost:hover { border-color: rgba(46,211,183,.6); }
  .empty { color: var(--panel-muted); font-size: 12px; padding: 10px 0; }
  mark { background: rgba(217,154,25,.28); color: inherit; padding: 0 2px; border-radius: 3px; }

  @media (max-width: 1080px) {
    .app { grid-template-columns: 0 minmax(0, 1fr) 0; }
    .sidebar, .inspector { position: fixed; top: 0; bottom: 0; z-index: 20; width: min(86vw, 330px); }
    .sidebar { left: 0; transform: translateX(-100%); }
    .inspector { right: 0; transform: translateX(100%); }
    body.mobile-sidebar .sidebar { opacity: 1; transform: translateX(0); pointer-events: auto; }
    body.mobile-inspector .inspector { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .slide { height: calc(100vh - 154px); min-height: 0; }
    .slide-head { padding: 22px 20px 14px; }
    .slide-body { padding: 20px; }
    .cols-2, .cols-3, .stats, .sim { grid-template-columns: 1fr; }
    .tool-btn span { display: none; }
    .bottom { grid-template-columns: auto 1fr auto; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="brand"><div class="mark">H5</div><div><b>AI Native H5</b><span>ICE-DATA-WORK / Agent 框架</span></div></div>
      <div class="search"><input id="search" type="search" placeholder="搜索章节、机制、代码名"></div>
      <div id="nav"></div>
      <div class="sidebar-foot">快捷键：←/→ 翻页，空格下一页，F 演示模式，Ctrl+B 折叠目录，Ctrl+/ 评论面板。</div>
    </div>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div class="crumbs">
        <button class="icon-btn" id="toggleSidebar" title="折叠/展开侧栏">☰</button>
        <span id="crumbGroup">概览</span><span>·</span><strong id="crumbTitle">Agent 框架设计解读</strong>
      </div>
      <div class="toolbar">
        <button class="tool-btn" id="themeBtn" title="切换明暗主题">◐ <span>主题</span></button>
        <button class="tool-btn" id="focusBtn" title="演示模式">□ <span>演示</span></button>
        <button class="tool-btn" id="printBtn" title="打印或导出 PDF">⇩ <span>导出</span></button>
        <button class="icon-btn" id="toggleInspector" title="评论面板">▣</button>
      </div>
    </header>

    <section class="stage">
      <div class="slide-shell"><article class="slide" id="slide"></article></div>
    </section>

    <footer class="bottom">
      <div class="pager"><button class="icon-btn" id="prevBtn" title="上一页">‹</button><button class="icon-btn" id="nextBtn" title="下一页">›</button></div>
      <div class="progress"><span id="progress"></span></div>
      <div class="hint" id="pageHint">01 / 18</div>
    </footer>
  </main>

  <aside class="inspector" id="inspector">
    <div class="inspector-inner">
      <h3 id="inspectorTitle">讲解面板</h3>
      <div class="meta" id="inspectorMeta">当前页重点与本地评论</div>
      <div class="takeaways" id="takeaways"></div>
      <div class="comment-box">
        <h3>当页评论</h3>
        <input id="commentName" placeholder="你的名字（默认匿名）">
        <textarea id="commentText" placeholder="写下这页的疑问、补充或评审意见"></textarea>
        <div class="comment-actions"><button class="ghost" id="clearComment">清空</button><button class="ghost" id="saveComment">发送</button></div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </aside>
</div>

<script>
const slides = [
  {
    group: "概览", tag: "Start", title: "Agent 框架设计解读", kicker: "Runtime Deep Dive", 
    lead: "这套框架不是一个大模型加几个工具，而是一套多参与者、受治理、文件优先的 Agent 协作运行时。核心是同一个单跳执行内核，靠外层循环叠加 A2A 与回合后自驱能力。",
    takeaways: ["顶层模型是 User -> Twin -> Agents。", "Twin 是唯一 leader，所有高风险动作回流给用户确认。", "同一个 _run_single_hop 同时支撑 A2A 与 autostep。"],
    html: `<div class="flow"><span class="step">User</span><span class="arrow">-></span><span class="step">Twin 唯一 leader</span><span class="arrow">-></span><span class="step">专业 Agents</span><span class="arrow">-></span><span class="step">HITL 确认</span></div>
      <div class="stats"><div class="stat"><b>1</b><span>单跳内核 _run_single_hop</span></div><div class="stat"><b>3 / 6</b><span>A2A 软预算 / 硬顶跳数</span></div><div class="stat"><b>3 / 20</b><span>自驱每回合 / 每日上限</span></div><div class="stat"><b>6</b><span>Twin 仲裁拒绝闸</span></div></div>
      <div class="note info"><b>来源边界：</b>结论来自 backend/app/services/ 的真实实现：agent_runtime、orchestrator_svc、context_assembler_svc、plan_svc、proactivity_svc、proposal_svc、tools/registry。agents/_shared/context-protocol.md 描述的是迁移来源 ice-workbench 的运行时，不能混同。</div>`
  },
  {
    group: "概览", tag: "Layer", title: "六层分层架构", kicker: "Architecture", 
    lead: "框架自上而下分为六层，安全治理作为横切面贯穿每一层。理解分层，是理解 A2A 与自驱的前提。",
    takeaways: ["定义层用 agent.json 与 agent.md 固化能力契约。", "运行时只认单跳，编排层负责多跳状态机。", "访问控制在读取点前置，而不是事后过滤。"],
    html: `<table><thead><tr><th>层</th><th>落点</th><th>职责</th></tr></thead><tbody>
      <tr><td>定义层</td><td><code>agents/{id}/agent.json + agent.md</code></td><td>声明式契约：工具白名单、派单目标、权限模式、模型、推理强度。</td></tr>

    lead: "这套运行时不是靠单点复杂能力堆起来，而是靠几条一致原则把复杂度压住。",
    takeaways: ["文件系统是唯一真相源。", "访问控制要内嵌读取点。", "所有自动行为都必须有界、可暂停、可审计。"],
    html: `<div class="grid cols-2"><div class="card"><h3>文件优先（G3）</h3><p>文件系统是唯一真相源；SQLite / pgvector 只是可重建派生索引。</p></div><div class="card"><h3>访问控制内嵌读取点</h3><p>不是事后过滤，而是先过滤访问边界，再进行 top-k 检索排序。</p></div><div class="card"><h3>有界一切</h3><p>多跳有预算，自驱有上限，上下文有 budget，成本有月度硬顶。</p></div><div class="card"><h3>安全先于智能</h3><p>能力默认关灰度，高风险恒 HITL，先兑现契约再扩能力。</p></div></div><div class="card" style="margin-top:14px"><h3>可解释 / 可审计</h3><p>上下文每层带来源标注；每跳、每次主动动作都落审计与 jsonl，事后可完整追溯。</p></div>`
  },
  {
    group: "收尾", tag: "Gap", title: "待确认的实现细节", kicker: "Open Questions",
    lead: "以下是读代码时发现、值得团队确认是有意简化还是待补 gap 的点，非缺陷断言。",
    takeaways: ["ask 目前与 handoff 同路径。", "自驱步失败会把任务置 error，语义需确认。", "静默时段走进程级 env，不走 settings 缓存。"],
    html: `<div class="note danger"><b>1. ask 目前与 handoff 同路径：</b>文档说 ask 是咨询后控制权回到发起方，但主循环拿到 req 后不区分 action，ask 也会 record_hop + speaker=target。若需真正咨询返回，需补 ask 分支。</div><div class="note"><b>2. 自驱步失败会连带把任务置 error：</b>_run_single_hop 内部 errored 就会 set_status(error)，自驱步失败与用户回合失败被同等对待，是否符合预期值得确认。</div><div class="note"><b>3. 提议的 speaker 是 Twin：</b>即便被卡步骤 owner 是具体 Agent，语义上仍是 Twin 替用户把关、代为请示，与 Twin 唯一 leader 一致。</div><div class="note"><b>4. 静默时段走进程级 env：</b>IDW_QUIET_HOURS 直接从 os.environ 读取，改环境变量即时生效，但未纳入 settings 统一管理。</div>`
  }
];

const state = { index: 0, query: "", simStep: 0 };
const els = {
  nav: document.getElementById("nav"), slide: document.getElementById("slide"), progress: document.getElementById("progress"), pageHint: document.getElementById("pageHint"),
  crumbGroup: document.getElementById("crumbGroup"), crumbTitle: document.getElementById("crumbTitle"), takeaways: document.getElementById("takeaways"), inspectorTitle: document.getElementById("inspectorTitle"), inspectorMeta: document.getElementById("inspectorMeta"),
  search: document.getElementById("search"), commentName: document.getElementById("commentName"), commentText: document.getElementById("commentText"), commentList: document.getElementById("commentList")
};

function pad(n) { return String(n + 1).padStart(2, "0"); }
function textOf(slide) { return `${slide.group} ${slide.tag} ${slide.title} ${slide.lead} ${slide.html}`.replace(/<[^>]+>/g, " "); }
function matches(slide) { return !state.query || textOf(slide).toLowerCase().includes(state.query.toLowerCase()); }
function highlight(text) {
  if (!state.query) return text;
  const q = state.query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return text.replace(new RegExp(q, "ig"), m => `<mark>${m}</mark>`);
}

function renderNav() {
  const groups = [...new Set(slides.map(s => s.group))];
  els.nav.innerHTML = groups.map(group => {
    const items = slides.map((slide, i) => ({ slide, i })).filter(x => x.slide.group === group && matches(x.slide));
    if (!items.length) return "";
    return `<div class="tree-group">${group}</div>` + items.map(({slide, i}) => `<button class="nav-item ${i === state.index ? "active" : ""}" data-go="${i}"><span class="nav-index">${pad(i)}</span><span class="nav-title">${highlight(slide.title)}</span><span class="nav-tag">${slide.tag}</span></button>`).join("");
  }).join("") || `<div class="empty">未找到匹配章节</div>`;
  els.nav.querySelectorAll("[data-go]").forEach(btn => btn.addEventListener("click", () => go(Number(btn.dataset.go))));
}

function renderSlide() {
  const s = slides[state.index];
  els.slide.innerHTML = `<div class="slide-head"><div><div class="kicker">${s.kicker}</div><h2>${highlight(s.title)}</h2><p class="slide-lead">${highlight(s.lead)}</p></div><div class="slide-no">${pad(state.index)}</div></div><div class="slide-body">${s.html}</div>`;
  els.crumbGroup.textContent = s.group;
  els.crumbTitle.textContent = s.title;
  els.progress.style.width = `${((state.index + 1) / slides.length) * 100}%`;
  els.pageHint.textContent = `${pad(state.index)} / ${String(slides.length).padStart(2, "0")}`;
  els.inspectorTitle.textContent = s.title;
  els.inspectorMeta.textContent = `${s.group} · ${s.kicker}`;
  els.takeaways.innerHTML = s.takeaways.map(t => `<div class="takeaway">${t}</div>`).join("");
  attachSlideInteractions();
  renderComments();
}

function attachSlideInteractions() {
  const simBtn = document.getElementById("simNext");
  if (simBtn) {
    const logs = ["Twin 接收用户回合，resolve_speaker 完成。", "Data Agent 完成分析后发出 handoff 指令。", "Report Agent 接手，context_assembler 注入 a2a 前序摘要。", "QC Agent 检查风险；若无后续指令，循环 break。"];
    simBtn.addEventListener("click", () => {
      state.simStep = (state.simStep + 1) % 4;
      document.querySelectorAll(".sim-node").forEach((node, i) => node.classList.toggle("active", i === state.simStep));
      document.getElementById("simLog").textContent = logs[state.simStep];
    });
  }
  const maxHops = document.getElementById("maxHops");
  const hardCap = document.getElementById("hardCap");
  if (maxHops && hardCap) {
    const update = () => {
      const max = Number(maxHops.value); const hard = Number(hardCap.value); const effective = Math.max(1, Math.min(max, hard));
      document.getElementById("maxHopsVal").textContent = max;
      document.getElementById("hardCapVal").textContent = hard;
      document.getElementById("hopMeter").style.width = `${effective * 10}%`;
      document.getElementById("hopResult").textContent = `effective_max = max(1, min(${max}, ${hard})) = ${effective}；允许 ${effective} 次转交，共最多 ${effective + 1} 个 speaker 发言。`;
    };
    maxHops.addEventListener("input", update); hardCap.addEventListener("input", update); update();
  }
}

function go(i) {
  state.index = Math.max(0, Math.min(slides.length - 1, i));
  state.simStep = 0;
  renderNav(); renderSlide();
}
function next() { go(state.index + 1); }
function prev() { go(state.index - 1); }
function commentKey() { return `idw-agent-deck-comments:${state.index}`; }
function getComments() { try { return JSON.parse(localStorage.getItem(commentKey()) || "[]"); } catch { return []; } }
function setComments(list) { localStorage.setItem(commentKey(), JSON.stringify(list)); }
function renderComments() {
  const list = getComments();
  els.commentList.innerHTML = list.length ? list.map(c => `<div class="comment"><b>${c.name}<time> · ${c.time}</time></b><p>${c.text}</p></div>`).join("") : `<div class="empty">还没有评论。选中某页后可在这里记录评审意见。</div>`;
}

document.getElementById("nextBtn").addEventListener("click", next);
document.getElementById("prevBtn").addEventListener("click", prev);
document.getElementById("toggleSidebar").addEventListener("click", () => {
  if (window.innerWidth <= 1080) document.body.classList.toggle("mobile-sidebar");
  else document.body.classList.toggle("sidebar-collapsed");
});
document.getElementById("toggleInspector").addEventListener("click", () => {
  if (window.innerWidth <= 1080) document.body.classList.toggle("mobile-inspector");
  else document.body.classList.toggle("inspector-collapsed");
});
document.getElementById("focusBtn").addEventListener("click", () => document.body.classList.toggle("focus-mode"));
document.getElementById("themeBtn").addEventListener("click", () => {
  const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = nextTheme;
  localStorage.setItem("idw-agent-deck-theme", nextTheme);
});
document.getElementById("printBtn").addEventListener("click", () => window.print());
document.getElementById("saveComment").addEventListener("click", () => {
  const text = els.commentText.value.trim();
  if (!text) return;
  const name = els.commentName.value.trim() || "匿名";
  const list = getComments();
  list.unshift({ name, text, time: new Date().toLocaleString("zh-CN", { hour12: false }) });
  setComments(list); els.commentText.value = ""; renderComments();
});
document.getElementById("clearComment").addEventListener("click", () => { els.commentText.value = ""; });
els.search.addEventListener("input", e => { state.query = e.target.value.trim(); renderNav(); renderSlide(); });

document.addEventListener("keydown", e => {
  const typing = ["INPUT", "TEXTAREA"].includes(document.activeElement.tagName);
  if (!typing && (e.key === "ArrowRight" || e.key === " ")) { e.preventDefault(); next(); }
  if (!typing && e.key === "ArrowLeft") { e.preventDefault(); prev(); }
  if (!typing && e.key === "Home") { e.preventDefault(); go(0); }
  if (!typing && e.key === "End") { e.preventDefault(); go(slides.length - 1); }
  if (!typing && e.key.toLowerCase() === "f") { e.preventDefault(); document.body.classList.toggle("focus-mode"); }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") { e.preventDefault(); document.getElementById("toggleSidebar").click(); }
  if ((e.ctrlKey || e.metaKey) && e.key === "/") { e.preventDefault(); document.getElementById("toggleInspector").click(); }
});

const savedTheme = localStorage.getItem("idw-agent-deck-theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
renderNav();
renderSlide();
</script>
</body>
</html>
