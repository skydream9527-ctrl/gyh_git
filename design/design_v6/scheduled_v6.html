<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICE Workbench v6 · 定时调度 Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#faf4ed', surface: '#ffffff', 'surface-2': '#f5efe4', border: '#e5dcc8', 'border-soft': '#ede5d2',
          text: '#1a1612', 'text-dim': '#5b5246', 'text-muted': '#8a7e69',
          primary: '#cc785c', 'primary-hover': '#b8624a', 'primary-soft': '#f5e8e2',
          success: '#5a7a4f', warning: '#b07d2a', error: '#b54a3a'
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        boxShadow: { 'card': '0 2px 8px rgba(26, 22, 18, 0.04), 0 1px 2px rgba(26, 22, 18, 0.02)' }
      }
    }
  }
</script>
<style>
  body { background-color: theme('colors.bg'); color: theme('colors.text'); }
  .toggle-checkbox:checked { right: 0; border-color: theme('colors.primary'); background-color: theme('colors.primary'); }
  .toggle-checkbox:checked + .toggle-label { background-color: theme('colors.primary-soft'); border-color: theme('colors.primary'); }
</style>
</head>
<body class="min-h-screen flex flex-col font-sans">

  <header class="h-14 bg-surface border-b border-border flex items-center justify-between px-6 sticky top-0 z-20">
    <div class="flex items-center gap-6 text-sm font-medium text-text-dim">
      <div class="flex items-center gap-2 text-text font-semibold mr-4">
        <svg class="w-5 h-5 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 7.5l-10-5v10l10 5 10-5v-10l-10 5z"/></svg>
        <span>ICE Workbench</span>
      </div>
      <span class="hover:text-text cursor-pointer transition-colors py-4">仪表盘</span>
      <span class="text-text border-b-2 border-primary py-4">定时调度</span>
      <span class="hover:text-text cursor-pointer transition-colors py-4">智能体编排</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-primary-hover text-white flex items-center justify-center font-medium shadow-btn">A</div>
    </div>
  </header>

  <main class="flex-1 max-w-6xl w-full mx-auto p-6 md:p-8 space-y-6">
    <div class="flex items-end justify-between">
      <div>
        <div class="text-[11px] font-mono text-text-muted uppercase tracking-wider mb-1">定时调度 · 智能驱动</div>
        <h1 class="text-2xl font-semibold">定时调度 Tasks</h1>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-4">
      <div class="bg-surface border border-border rounded-xl p-4 shadow-card">
        <div class="text-xs text-text-muted font-mono uppercase mb-1">运行中任务</div>
        <div class="text-3xl font-semibold text-text">12</div>
      </div>
      <div class="bg-surface border border-border rounded-xl p-4 shadow-card opacity-70">
        <div class="text-xs text-text-muted font-mono uppercase mb-1">已暂停</div>
        <div class="text-3xl font-semibold text-text">3</div>
      </div>
      <div class="bg-surface border border-border rounded-xl p-4 shadow-card">
        <div class="text-xs text-text-muted font-mono uppercase mb-1">今日已执行</div>
        <div class="text-3xl font-semibold text-text">28</div>
      </div>
      <div class="bg-surface border border-error/30 rounded-xl p-4 shadow-card">
        <div class="text-xs text-error font-mono uppercase mb-1">近7天失败</div>
        <div class="text-3xl font-semibold text-error">1</div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-surface border border-border shadow-card rounded-xl overflow-hidden mt-6">
      <table class="w-full text-left text-[13px]">
        <thead class="bg-surface-2 text-text-muted font-mono text-[11px] border-b border-border">
          <tr>
            <th class="p-4 font-medium">定时任务 / 绑定工作流</th>
            <th class="p-4 font-medium">执行频率</th>
            <th class="p-4 font-medium">下次执行时间</th>
            <th class="p-4 font-medium">最近执行状态</th>
            <th class="p-4 font-medium text-right">启停控制</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-border">
          <!-- Item 1 -->
          <tr class="hover:bg-surface-2 transition-colors cursor-pointer group">
            <td class="p-4">
              <div class="font-medium text-text text-[14px]">每日客诉工单总结</div>
              <div class="text-[11px] text-text-muted mt-1 font-mono">Workspace: # 客诉监控底座</div>
            </td>
            <td class="p-4">
              <div class="font-mono text-[12px] bg-surface-2 px-1.5 py-0.5 rounded border border-border inline-block">0 9 * * 1-5</div>
              <div class="text-[11px] text-text-muted mt-1">工作日 09:00</div>
            </td>
            <td class="p-4 text-text-dim font-mono text-[12px]">明天, 09:00</td>
            <td class="p-4">
              <span class="px-2 py-0.5 rounded text-[11px] font-mono bg-success/10 text-success border border-success/20">执行成功</span>
            </td>
            <td class="p-4 text-right">
              <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="toggle1" checked class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-primary"/>
                <label for="toggle1" class="toggle-label block overflow-hidden h-5 rounded-full bg-primary-soft border border-primary cursor-pointer"></label>
              </div>
            </td>
          </tr>
          
          <!-- Item 2 -->
          <tr class="hover:bg-surface-2 transition-colors cursor-pointer group">
            <td class="p-4">
              <div class="font-medium text-text text-[14px]">竞品每周财报数据拉取</div>
              <div class="text-[11px] text-text-muted mt-1 font-mono">Workspace: # 竞品分析 V2</div>
            </td>
            <td class="p-4">
              <div class="font-mono text-[12px] bg-surface-2 px-1.5 py-0.5 rounded border border-border inline-block">0 10 * * 1</div>
              <div class="text-[11px] text-text-muted mt-1">每周一 10:00</div>
            </td>
            <td class="p-4 text-text-dim font-mono text-[12px] opacity-50">-</td>
            <td class="p-4">
              <span class="px-2 py-0.5 rounded text-[11px] font-mono bg-warning/10 text-warning border border-warning/20">暂停中</span>
            </td>
            <td class="p-4 text-right">
              <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="toggle2" class="absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-border-strong right-5"/>
                <label for="toggle2" class="block overflow-hidden h-5 rounded-full bg-surface-2 border border-border-strong cursor-pointer"></label>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</body>
</html>
