# rollout_phases.yaml - 放量阶段配置
#
# 定义版本灰度的放量节奏、各阶段目的和决策标准
# 定制为：5% → 10% → 30% → 全量
#
# 使用方式：Phase 0 信息收集 / Phase 4 决策建议

# 基础配置
total_dau: 30000000  # 大盘总DAU（3000万）

# 放量阶段定义
phases:
  # ═══════════════════════════════════════
  # 阶段1: 5% 初始灰度
  # ═══════════════════════════════════════
  - stage: 1
    traffic: "5%"
    label: 初始灰度
    dau: 1500000  # 约150万DAU
    purpose: |
      生成对照包和业务包，首次验证变量效果。
      这是灰度的起始点，两组用户通过版本号完全隔离。
    key_actions:
      - 对照包：无实验变量的基线版本
      - 业务包：包含本次改动的实验版本
      - 两组用户完全隔离，通过app_version区分
    min_duration: 3d   # 最短运行3天
    recommended_duration: 7d  # 建议运行7天
    risk_tolerance: 高  # 风险容忍度高
    pass_criteria: |
      核心指标无严重下降（>-5%）即可进入下一阶段。
      重点关注：
      • 无崩溃/严重bug
      • 核心指标未触及业务红线
      • 直接指标有初步响应
    decision_options:
      - action: 进入10%
        condition: 无严重问题
      - action: 暂停并排查
        condition: 出现崩溃或核心指标大幅下降
      - action: 回滚版本
        condition: 存在无法接受的严重问题

  # ═══════════════════════════════════════
  # 阶段2: 10% 扩大验证
  # ═══════════════════════════════════════
  - stage: 2
    traffic: "10%"
    label: 扩大验证
    dau: 3000000  # 约300万DAU
    purpose: |
      扩大数据量，观察指标稳定性。
      积累更多样本以提升统计功效。
    min_duration: 3d
    recommended_duration: 7d
    risk_tolerance: 中等
    pass_criteria: |
      核心指标正向或平稳，直接指标符合预期。
      开始关注统计显著性：
      • 主要核心指标的p值应<0.05或有明显趋势
      • 因果链路应基本成立
    decision_options:
      - action: 进入30%
        condition: 表现良好且稳定
      - action: 继续观察
        condition: 数据波动较大需更多积累
      - action: 暂停并下钻
        condition: 出现异常指标

  # ═══════════════════════════════════════
  # 阶段3: 30% 决策判断
  # ═══════════════════════════════════════
  - stage: 3
    traffic: "30%"
    label: 决策判断
    dau: 9000000  # 约900万DAU
    purpose: |
      关键决策节点，准备全量发布或回滚。
      此时数据量充足，结论可信度高。
    min_duration: 3d
    recommended_duration: 7d
    risk_tolerance: 较低  # 风险容忍度降低
    pass_criteria: |
      数据表现优异且稳定，严格执行SOP决策矩阵：
      • 全部正向 → 可推全
      • 部分正向+平稳 → 可推全
      • 此消彼长 → 必须人工评估
      • 出现下降 → 暂不放量
    decision_options:
      - action: 全量发布 ✅
        condition: 数据优异且稳定，无任何负向指标
        note: 可从30%直接跳到100%，跳过50%
      - action: 继续放量到50%（可选）
        condition: 数据良好但想更谨慎
        skippable: true
      - action: 暂停并人工评估
        condition: 此消彼长或其他复杂情况
      - action: 回滚版本
        condition: 核心指标出现不可接受的下降

  # ═══════════════════════════════════════
  # 阶段4: 100% 全量发布
  # ═══════════════════════════════════════
  - stage: 4
    traffic: "100%"
    label: 全量发布
    dau: 30000000  # 3000万DAU
    purpose: 推全，所有用户使用新版本
    is_final: true
    post_release_actions:
      - 提交代码清理需求（删除分组逻辑）
      - 归档实验结论和报告
      - 设置监控告警（回滚准备）

# 跳过规则
skip_rules:
  # 从30%直接推全
  - from_stage: 3
    to_stage: 4
    skip_stages: [ ]  # 无中间阶段（没有50%阶段）
    condition: 早期数据表现优异且无负向指标
    requires_human_confirm: true  # 必须人工确认
    recommendation: "如30%阶段数据持续优异，可直接推全"

# 终止条件（立即停止实验）
termination_conditions:
  - condition: 业务包出现严重bug
    severity: critical
    examples:
      - 大范围崩溃（崩溃率>5%）
      - 功能完全不可用
      - 数据丢失风险
    action: 立即停止实验，紧急回滚
      
  - condition: 与变量无关的指标暴涨暴降
    severity: high
    examples:
      - 非直接指标的非预期大幅波动（>20%）
      - 用户投诉量激增（>3倍）
    action: 暂停实验，排查原因
    
  - condition: 核心指标触及业务红线
    severity: high
    examples:
      - DAU下降>10%
      - 收入下降>15%
      - 留存率下降>5个百分点
    action: 暂停放量，执行下钻分析

# 各阶段监控重点
monitoring_focus_by_phase:
  "5%":
    - 崩溃率和稳定性
    - 功能可用性
    - 核心指标是否出现极端异常
    
  "10%":
    - 核心指标趋势是否稳定
    - 统计显著性是否逐步显现
    - 直接指标是否符合预期
    
  "30%":
    - SOP决策矩阵匹配
    - 此消彼长的详细评估
    - 长期影响预判
