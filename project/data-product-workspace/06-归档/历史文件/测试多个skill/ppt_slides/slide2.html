<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f7fafc;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #667eea;
  padding: 15pt 40pt;
}
.header h1 {
  color: #ffffff;
  font-size: 28pt;
  margin: 0;
}
.content {
  padding: 20pt 40pt 30pt 40pt;
  flex: 1;
}
.section {
  margin-bottom: 15pt;
}
.section h2 {
  color: #2d3748;
  font-size: 16pt;
  margin: 0 0 8pt 0;
}
.highlight {
  background: #ffffff;
  padding: 10pt;
  border-left: 3pt solid #48bb78;
  margin-bottom: 8pt;
}
.highlight p {
  color: #2d3748;
  font-size: 12pt;
  margin: 0;
}
.warning {
  background: #ffffff;
  padding: 10pt;
  border-left: 3pt solid #ed8936;
}
.warning p {
  color: #2d3748;
  font-size: 12pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>📊 核心结论</h1>
</div>
<div class="content">
  <div class="section">
    <h2>✅ 整体表现优异</h2>
    <div class="highlight">
      <p><b>用户规模提升：</b>DAU平均提升 <b>6.4%</b></p>
    </div>
    <div class="highlight">
      <p><b>使用时长增加：</b>人均时长提升 <b>1.5%-2.9%</b></p>
    </div>
    <div class="highlight">
      <p><b>消费深度增强：</b>人均VV提升 <b>2.6%-3.7%</b></p>
    </div>
  </div>
  <div class="section">
    <h2>⚠️ 需要关注</h2>
    <div class="warning">
      <p><b>广告CTR略有下降：</b>下降 <b>1.8%-4.7%</b></p>
    </div>
  </div>
</div>
</body>
</html>
