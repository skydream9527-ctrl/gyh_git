<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1a1a1a;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #2d2d2d;
  padding: 12pt 40pt;
  border-bottom: 2pt solid #00d4ff;
}
.header h1 {
  color: #00d4ff;
  font-size: 26pt;
  margin: 0;
}
.content {
  padding: 15pt 40pt 30pt 40pt;
  flex: 1;
  display: flex;
}
.left {
  flex: 1;
  padding-right: 15pt;
}
.right {
  flex: 1;
}
.finding-box {
  background: #2d2d2d;
  padding: 10pt;
  margin-bottom: 10pt;
  border-radius: 8pt;
  border-left: 3pt solid #10b981;
}
.finding-box h3 {
  color: #10b981;
  font-size: 13pt;
  margin: 0 0 5pt 0;
}
.finding-box p {
  color: #ffffff;
  font-size: 11pt;
  margin: 0;
}
.chart-placeholder {
  background: #2d2d2d;
  width: 100%;
  height: 200pt;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>🔍 关键发现</h1>
</div>
<div class="content">
  <div class="left">
    <div class="finding-box">
      <h3>用户规模提升</h3>
      <p>DAU平均提升 6.47%</p>
    </div>
    <div class="finding-box">
      <h3>使用时长增加</h3>
      <p>人均时长提升 1.5%-2.9%</p>
    </div>
    <div class="finding-box">
      <h3>消费深度增强</h3>
      <p>人均VV提升 2.6%-3.7%</p>
    </div>
    <div class="finding-box">
      <h3>新用户表现突出</h3>
      <p>留存率提升最高达 20%</p>
    </div>
  </div>
  <div class="right">
    <div id="chart" class="placeholder chart-placeholder" style="width: 280pt; height: 200pt;"></div>
  </div>
</div>
</body>
</html>
