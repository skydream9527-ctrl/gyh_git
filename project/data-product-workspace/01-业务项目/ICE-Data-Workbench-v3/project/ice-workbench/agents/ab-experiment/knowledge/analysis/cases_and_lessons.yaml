good_cases:
  - case_id: case_20260513_reward_tab
    experiment_id: "2266983/2266984"
    date: "2026-05-13"
    title: 赚钱Tab底部导航实验
    good_practices:
      - practice: 量化归因分析
        description: 通过"流失用户数 × 人均VV = 潜在VV损失"成功量化Tab挤压影响（解释93%缺口）
        reusable: true
      - practice: 多竞争假设并行验证
        description: 列出4个竞争假设并逐一用数据验证，按可信度排序，避免单一归因
        reusable: true
      - practice: 用户重叠分析
        description: 通过赚钱Tab用户与视频Tab用户的重叠分析，识别高活用户被分流现象
        reusable: true
      - practice: 机会成本估算
        description: 计算被分流高活用户留在原场景的潜在消费贡献，量化机会成本
        reusable: true

bad_cases:
  - case_id: case_20260513_reward_tab
    experiment_id: "2266983/2266984"
    date: "2026-05-13"
    title: 赚钱Tab底部导航实验
    mistakes:
      - mistake: 初始过度归因于分流偏差
        description: 第一轮下钻直接将消费率下降归因于"分流偏差"，忽略了Tab挤压这一更直接的物理解释
        root_cause: 缺乏"底部导航Tab变更"场景模式指导，未优先验证功能位置挤压假设
        fix: 新增"底部导航Tab变更"场景模式，强制优先验证功能挤压假设
      - mistake: 无AA时仍尝试查询AA基线
        description: 用户明确告知无AA后仍执行了AA相关查询，浪费资源
        root_cause: Phase 0 未严格确认AA有无，进入Phase 1 后按默认流程执行
        fix: 新增no_aa_handling规则，Phase 0 强制确认AA状态
      - mistake: 单一假设结论
        description: 第一版下钻仅给出1个主要假设，未提供竞争假设对比
        root_cause: 模板中未要求≥3个竞争假设
        fix: report_template下钻节增加规则"必须列出≥3个竞争假设"
      - mistake: SQL字段试错
        description: 多次使用错误字段名（new_eid→eid, did→distinct_id），通过试错纠正
        root_cause: 数据字典中缺乏表级别字段映射的明确记录
        fix: 后续应完善data_dictionary.yaml中的表字段映射

changelog:
  - date: "2026-05-14"
    author: AI
    action: update
    description: 新增首个案例(case_20260513_reward_tab)，记录赚钱Tab实验分析中的4个好实践和4个改进项
