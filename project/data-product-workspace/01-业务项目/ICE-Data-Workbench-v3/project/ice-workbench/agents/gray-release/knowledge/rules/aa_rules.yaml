# aa_rules.yaml - AA实验规则
#
# 定义AA实验的执行规则、波动判定标准和异常处理流程
# 版本灰度通常免AA，但保留AA校验能力
#
# 使用方式：Phase 2 数据校验 / Phase 3 Step 3 因果链路验证

# AA实验基本配置
aa_experiment:
  enabled: false  # 默认关闭（版本灰度通常免AA）
  
duration:
  standard: 7d          # 标准AA实验时长：7天
  minimum: 3d           # 最短时长：3天
  natural_week_coverage: optional  # 是否需要覆盖自然周（非强制）

# 波动判定规则
fluctuation_thresholds:
  # 小流量场景（<5万DAU）
  - traffic_level: 小流量
    dau_range: [0, 50000]
    range: "±1%"         # 正常波动范围 ±1%
    
  # 中流量场景（5-10万DAU）
  - traffic_level: 中流量
    dau_range: [50000, 100000]
    range: "±0.5%"       # 正常波动范围 ±0.5%
    
  # 大流量场景（>10万DAU）
  - traffic_level: 大流量
    dau_range: [100000, infinity]
    range: "±0.3%"       # 正常波动范围 ±0.3%

# 异常处理规则
anomaly_handling:
  # 是否需要重新分配流量
  reassign_traffic: false  # 不需要重新分配
  
  # 是否需要扣除基线偏移
  deduct_baseline: true    # 需要扣除AA基线
  
  # 扣除算法说明
  deduction_formula: >
    (AB实验组变化 - AB对照组变化) - (AA期间实验组变化 - AA期间对照组变化)

# 免AA实验规则
exemption:
  allowed: true            # 允许免AA
  default_behavior: exempt  # 默认行为：免AA
  
  # 免AA的条件
  conditions:
    - condition: 大DAU产品
      description: "大DAU产品数据波动较小，可免AA"
      threshold_dau: 1000000  # DAU > 100万
      
    - condition: 紧急发布
      description: "紧急版本发布，时间紧迫"
      requires_approval: true
      
  # 免AA时的额外措施
  extra_attention_required:
    - item: 数据基线稳定性监控
      description: "额外关注数据基线是否稳定"
      
    - item: 历史同期对比
      description: "与历史同期的自然波动对比"
      
    - item: 延长观察期
      description: "建议观察期延长至5-7天"

# AA验收标准
acceptance_criteria:
  # 通过标准
  pass_condition: "所有核心指标波动均在正常范围内"
  
  # 不通过时的处理
  fail_action: "不重新分配流量，直接开启AB实验，并在结果中扣除AA基线"
  
  # 边缘情况
  borderline_action: "记录偏移量，在AB分析时扣除"
