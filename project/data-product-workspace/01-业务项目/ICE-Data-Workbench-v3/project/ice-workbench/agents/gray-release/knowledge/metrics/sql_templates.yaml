# sql_templates.yaml - SQL查询模板
#
# 定义版本灰度数据获取的SQL模板
# 支持通过Kyuubi执行SQL查询数据库
#
# 使用方式：Phase 1 数据获取

# ═══════════════════════════════════════
# 核心指标查询模板（基于版本号）
# ═══════════════════════════════════════
core_metrics_query:
  template: |
    WITH base_data AS (
      SELECT
        date,
        app_version,
        CASE 
          WHEN user_type IN ('new', 'new_user') THEN '新用户'
          WHEN user_type IN ('old', 'returning', 'existing') THEN '老用户'
          ELSE '大盘用户'
        END AS user_type_group,
        
        -- ══ 规模指标 ══
        COUNT(DISTINCT user_id) AS dau,
        
        -- ══ 消费指标 ══
        AVG(duration) AS avg_dur,
        AVG(consumption_duration) AS avg_xiaofei_dur,
        AVG(video_views) AS avg_vv,
        
        -- ══ 收入指标 ══
        SUM(revenue) AS total_revenue,
        SUM(revenue) / COUNT(DISTINCT user_id) AS arpu,
        SUM(feed_revenue) AS feed_revenue,
        SUM(feed_revenue) / COUNT(DISTINCT user_id) AS feed_arpu,
        SUM(ad_impressions) / COUNT(DISTINCT user_id) AS ipu,
        CASE 
          WHEN SUM(ad_impressions) > 0 
          THEN SUM(ad_revenue) / (SUM(ad_impressions) / 1000) 
          ELSE 0 
        END AS ecpm,
        
        -- ══ 留存指标 ══
        AVG(CASE WHEN next_day_active = 1 THEN 1.0 ELSE 0.0 END) AS retention_rate
        
      FROM user_behavior_fact_table
      WHERE date BETWEEN '{start_date}' AND '{end_date}'
        AND app_version IN ('{control_version}', '{treatment_version}')
        AND {additional_filters}  -- 可选的额外过滤条件
      
      GROUP BY date, app_version, 
               CASE 
                 WHEN user_type IN ('new', 'new_user') THEN '新用户'
                 WHEN user_type IN ('old', 'returning', 'existing') THEN '老用户'
                 ELSE '大盘用户'
               END
    )
    
    SELECT 
      date,
      app_version,
      user_type_group,
      
      -- 聚合统计
      COUNT(*) AS sample_size,
      
      -- 规模指标
      AVG(dau) AS dau_mean,
      STDDEV(dau) AS dau_std,
      
      -- 消费指标
      AVG(avg_dur) AS avg_dur_mean,
      STDDEV(avg_dur) AS avg_dur_std,
      AVG(avg_xiaofei_dur) AS avg_xiaofei_dur_mean,
      STDDEV(avg_xiaofei_dur) AS avg_xiaofei_dur_std,
      AVG(avg_vv) AS avg_vv_mean,
      STDDEV(avg_vv) AS avg_vv_std,
      
      -- 收入指标
      AVG(total_revenue) AS total_revenue_mean,
      AVG(arpu) AS arpu_mean,
      AVG(feed_revenue) AS feed_revenue_mean,
      AVG(feed_arpu) AS feed_arpu_mean,
      AVG(ipu) AS ipu_mean,
      AVG(ecpm) AS ecpm_mean,
      
      -- 留存指标
      AVG(retention_rate) AS retention_rate_mean,
      STDDEV(retention_rate) AS retention_rate_std
      
    FROM base_data
    GROUP BY date, app_version, user_type_group
    ORDER BY date, app_version
  
  parameters:
    - name: control_version
      type: string
      required: true
      description: 对照包版本号（如 27.9.0）
      example: "27.9.0"
      
    - name: treatment_version
      type: string
      required: true
      description: 业务包版本号（如 28.0.0）
      example: "28.0.0"
      
    - name: start_date
      type: date
      required: true
      description: 分析开始日期（YYYY-MM-DD）
      example: "2024-04-01"
      
    - name: end_date
      type: date
      required: true
      description: 分析结束日期（YYYY-MM-DD）
      example: "2024-04-07"
      
    - name: additional_filters
      type: string
      required: false
      description: 可选的额外过滤条件（如媒体类型、平台等）
      example: "media_type = 'browser'"

# ═══════════════════════════════════════
# 直接指标查询模板（动态字段）
# ═══════════════════════════════════════
direct_metrics_query:
  template: |
    SELECT
      date,
      app_version,
      user_type,
      
      {direct_metrics_select}  -- 动态注入的直接指标字段
      
    FROM direct_metrics_table
    WHERE date BETWEEN '{start_date}' AND '{end_date}'
      AND app_version IN ('{control_version}', '{treatment_version}')
    GROUP BY date, app_version, user_type
    ORDER BY date, app_version
  
  parameters:
    - name: direct_metrics_select
      type: string_array
      required: true
      description: 直接指标的SELECT字段列表（从Phase 0获取）
      example: >
        [
          "COUNT(CASE WHEN clicked_entry_a = 1 THEN 1 END) / COUNT(*) AS entry_a_ctr",
          "AVG(entry_a_exposure_count) AS entry_a_avg_exposure",
          "..."
        ]
      
    - name: control_version
      type: string
      required: true
      
    - name: treatment_version
      type: string
      required: true
      
    - name: start_date
      type: date
      required: true
      
    - name: end_date
      type: date
      required: true

# ═══════════════════════════════════════
# AA实验数据查询（如有AA数据）
# ═══════════════════════════════════════
aa_experiment_query:
  template: |
    SELECT
      date,
      app_version,
      user_type,
      
      -- 与core_metrics相同的指标字段
      {core_metrics_fields}
      
    FROM aa_experiment_table
    WHERE aa_period_start >= '{aa_start_date}'
      AND aa_period_end <= '{aa_end_date}'
      AND app_version IN ('{control_version}', '{control_version}')  -- AA期间两组都是对照包
    GROUP BY date, app_version, user_type
  
  parameters:
    - name: aa_start_date
      type: date
      required: true
      description: AA实验开始日期
      
    - name: aa_end_date
      type: date
      required: true
      description: AA实验结束日期
      
    - name: control_version
      type: string
      required: true
      description: 版本号（AA期间两组相同）
      
    - name: core_metrics_fields
      type: string
      required: true
      description: 核心指标字段（与core_metrics_query保持一致）

# ═══════════════════════════════════════
# 下钻分析专用查询模板
# ═══════════════════════════════════════
drilldown_by_dimension_query:
  template: |
    SELECT
      {dimension_column} AS drill_dimension,
      app_version,
      
      -- 待分析的指标
      {metric_to_analyze},
      COUNT(*) AS sample_size
      
    FROM detailed_behavior_table
    WHERE date BETWEEN '{start_date}' AND '{end_date}'
      AND app_version IN ('{control_version}', '{treatment_version}')
    GROUP BY {dimension_column}, app_version
    HAVING COUNT(*) >= {min_sample_size}  -- 过滤样本不足的维度值
    ORDER BY {metric_to_analyze} DESC
  
  parameters:
    - name: dimension_column
      type: string
      required: true
      description: 下钻维度字段（如entry_name, category, device_model）
      example: "entry_name"
      
    - name: metric_to_analyze
      type: string
      required: true
      description: 待分析的指标表达式
      example: "AVG(click_rate)"
      
    - name: min_sample_size
      type: integer
      required: false
      default: 100
      description: 最小样本量阈值

# ═══════════════════════════════════════
# SRM校验查询
# ═══════════════════════════════════════
srm_check_query:
  template: |
    SELECT
      app_version,
      COUNT(DISTINCT user_id) AS sample_size,
      ROUND(COUNT(DISTINCT user_id) * 100.0 / SUM(COUNT(DISTINCT user_id)) OVER(), 2) AS sample_percentage
    FROM experiment_assignment_table
    WHERE date BETWEEN '{start_date}' AND '{end_date}'
      AND app_version IN ('{control_version}', '{treatment_version}')
      AND is_in_experiment = 1  -- 仅实验分流用户
    GROUP BY app_version
  
  parameters:
    - name: start_date
      type: date
      required: true
      
    - name: end_date
      type: date
      required: true
      
    - name: control_version
      type: string
      required: true
      
    - name: treatment_version
      type: string
      required: true

# SQL执行配置
execution_config:
  engine: Kyuubi  # 使用Kyuubi引擎
  timeout_seconds: 300  # 5分钟超时
  max_rows_limit: 1000000  # 最大返回行数限制
  cache_enabled: true  # 启用结果缓存
  cache_ttl_hours: 24  # 缓存有效期24小时

# 注意事项
notes:
  - 所有查询必须包含app_version作为分组维度
  - 日期范围必须与Phase 0确认的一致
  - 直接指标字段需要动态拼接，来自用户输入
  - 大表查询建议添加分区条件提升性能
  - 生产环境注意数据脱敏和权限控制
