# core_metrics.yaml - 核心指标定义
# 
# 本文件定义了版本灰度分析的核心指标体系（护栏指标）
# 所有核心指标仅允许正向或平稳，不允许下降
# 
# 使用方式：Phase 2 数据校验 / Phase 3 Step 1 核心指标分析

dimensions:
  - name: 媒体类型
    values: [浏览器, 内容中心]
    description: "产品媒体维度，用于区分不同产品的指标"

categories:
  # ═══════════════════════════════════════
  # 规模指标（护栏指标，不可恶化）
  # ═══════════════════════════════════════
  - category: 规模指标
    icon: "📊"
    description: "反映用户规模和留存的核心指标"
    direction_constraint: [正向, 平稳]  # 仅允许正向或平稳
    guardrail_enabled: true
    metrics:
      - name: 大盘DAU
        field: dau
        type: continuous
        source_module: 大盘指标
        unit: "人"
        importance: critical
        description: "日活跃用户数"
        
      - name: 信息流曝光用户
        field: ad_request_uv
        type: continuous
        source_module: 信息流日活率
        unit: "人"
        importance: high
        description: "信息流广告请求UV数"
        
      - name: 信息流有效用户
        field: valid_user_count
        type: continuous
        source_module: 信息流消费
        unit: "人"
        importance: high
        description: "产生有效行为的用户数"
        
      - name: 信息流消费用户
        field: consume_user_count
        type: continuous
        source_module: 信息流消费
        unit: "人"
        importance: high
        description: "实际消费内容的用户数"
        
      - name: 信息流用户次日留存
        field: e2e_ret
        type: ratio
        source_module: 信息流留存
        unit: "%"
        importance: critical
        description: "次日留存率（曝光到曝光）"

  # ═══════════════════════════════════════
  # 消费指标（护栏指标，不可恶化）
  # ═══════════════════════════════════════
  - category: 消费指标
    icon: "⏱️"
    description: "反映用户消费深度和粘性的核心指标"
    direction_constraint: [正向, 平稳]
    guardrail_enabled: true
    metrics:
      - name: 信息流人均停留时长
        field: avg_dur
        type: continuous
        source_module: 大盘指标
        unit: "分钟"
        importance: critical
        description: "人均在信息流的停留时长"
        
      - name: 信息流人均消费时长
        field: avg_xiaofei_dur
        type: continuous
        source_module: 大盘指标
        unit: "分钟"
        importance: critical
        description: "人均实际消费内容的时长（核心关注）"
        
      - name: 信息流人均VV
        field: avg_vv
        type: continuous
        source_module: 信息流消费
        unit: "次"
        importance: high
        description: "人均视频播放次数"

  # ═══════════════════════════════════════
  # 收入指标（护栏指标，不可恶化）
  # ═══════════════════════════════════════
  - category: 收入指标
    icon: "💰"
    description: "反映商业化效果的核心指标"
    direction_constraint: [正向, 平稳]
    guardrail_enabled: true
    metrics:
      - name: 大盘收入
        field: total_revenue
        type: continuous
        source_module: 商业中台
        unit: "元"
        importance: high
        description: "大盘总收入"
        
      - name: 大盘ARPU
        field: arpu
        type: continuous
        source_module: 商业中台
        unit: "元"
        importance: high
        description: "每用户平均收入"
        
      - name: 信息流收入
        field: feed_revenue
        type: continuous
        source_module: 商业中台
        unit: "元"
        importance: high
        description: "信息流收入"
        
      - name: 信息流ARPU
        field: feed_arpu
        type: continuous
        source_module: 商业中台
        unit: "元"
        importance: high
        description: "信息流每用户平均收入"
        
      - name: 信息流IPU
        field: ipu
        type: continuous
        source_module: ["OT口径广告", "商业中台"]
        unit: "次/人"
        importance: critical
        description: "人均广告展示次数（核心关注）"
        
      - name: 信息流eCPM
        field: ecpm
        type: continuous
        source_module: ["OT口径广告", "商业中台"]
        unit: "元"
        importance: critical
        description: "千次展示收益（核心关注）"

rules:
  # 护栏机制配置
  guardrail_enabled: true
  
  # 此消彼长处理规则
  tradeoff_requires_human: true  # 此消彼长必须人工决策
  
  # 显著性检验的作用
  significance_is_reference_only: true  # 仅作参考，不做硬性要求
  
  # 方向判定阈值
  direction_thresholds:
    positive_threshold: 0%       # >= 0 为正向
    steady_lower_bound: -3%     # -3% ~ 0 为平稳
    decline_upper_bound: -3%    # < -3% 为下降
    
  # 核心关注指标（特别标注）
  special_attention_metrics:
    - 信息流人均停留时长
    - 信息流人均消费时长
    - 信息流IPU
    - 信息流eCPM
