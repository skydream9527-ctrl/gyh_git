scenarios:
  - pattern: 新增入口/功能
    keywords:
      - 新增
      - 入口
      - 功能
      - 添加
      - 增加
    hypotheses:
      - name: 分流假设
        description: 新入口分流了原有入口的流量
        drill_dimensions:
          - 各入口点击率变化
          - 各入口转化率变化
        typical_conclusion: 新入口分流了原有入口的流量，但整体转化率仍提升/下降
      - name: 吸引假设
        description: 新入口吸引了低质量用户
        drill_dimensions:
          - 新入口用户后续行为
          - 原有用户后续行为对比
          - 新入口用户留存率
        typical_conclusion: 新入口吸引的用户质量较低/与原有用户无差异
      - name: 布局假设
        description: 新入口改变了页面布局，影响其他元素曝光
        drill_dimensions:
          - 各入口曝光量变化
          - 各模块停留时长变化
          - 页面滚动深度变化
        typical_conclusion: 新入口改变了页面布局，导致其他入口曝光减少/无影响

  - pattern: UI/样式变更
    keywords:
      - 样式
      - UI
      - 布局
      - 改版
      - 视觉
      - 皮肤
      - 主题
    hypotheses:
      - name: 注意力假设
        description: 样式变更改变了用户注意力分布
        drill_dimensions:
          - 各模块停留时长变化
          - 各模块点击率变化
          - 视觉热力图变化
        typical_conclusion: 样式变更导致用户注意力向某模块转移
      - name: 交互假设
        description: 样式变更影响了操作效率
        drill_dimensions:
          - 操作路径变化
          - 操作步骤数变化
          - 操作耗时变化
        typical_conclusion: 样式变更使操作效率提升/降低

  - pattern: 算法/推荐策略变更
    keywords:
      - 算法
      - 推荐
      - 策略
      - 排序
      - 召回
      - 模型
    hypotheses:
      - name: 质量假设
        description: 新策略内容质量不同
        drill_dimensions:
          - 内容消费完成率
          - 负反馈率
          - 内容评分变化
        typical_conclusion: 新策略推荐的内容质量提升/下降
      - name: 多样性假设
        description: 新策略改变了内容多样性
        drill_dimensions:
          - 内容品类分布变化
          - 内容来源分布变化
          - 用户兴趣覆盖度变化
        typical_conclusion: 新策略使内容多样性提升/下降
      - name: 冷启动假设
        description: 新策略对特定用户群效果不同
        drill_dimensions:
          - 新老用户分群效果
          - 活跃度分群效果
          - 兴趣偏好分群效果
        typical_conclusion: 新策略对某类用户效果更好/更差
      - name: 广告影响假设
        description: 算法变更改变了广告曝光分布
        drill_dimensions:
          - 广告曝光率变化
          - 广告点击率变化
          - eCPM变化
        typical_conclusion: 算法变更影响了广告的曝光和收入分布

  - pattern: 内容/资源位调整
    keywords:
      - 资源位
      - 卡片
      - 模块
      - 位置
      - 排序调整
    hypotheses:
      - name: 曝光竞争假设
        description: 资源位调整改变了各内容的曝光机会
        drill_dimensions:
          - 各资源位曝光量变化
          - 各资源位点击率变化
          - 内容消费深度变化
        typical_conclusion: 资源位调整使某些内容曝光增加/减少
      - name: 用户路径假设
        description: 资源位调整改变了用户浏览路径
        drill_dimensions:
          - 用户浏览路径变化
          - 页面停留时长分布变化
          - 跳出率变化
        typical_conclusion: 资源位调整使用户浏览路径变长/变短

  - pattern: 交互流程变更
    keywords:
      - 流程
      - 步骤
      - 交互
      - 操作
      - 引导
    hypotheses:
      - name: 转化漏斗假设
        description: 流程变更改变了各步骤的转化率
        drill_dimensions:
          - 各步骤转化率变化
          - 整体转化率变化
          - 流失节点变化
        typical_conclusion: 流程变更使某步骤转化率提升/下降
      - name: 体验摩擦假设
        description: 流程变更增加了或减少了体验摩擦
        drill_dimensions:
          - 操作步骤数变化
          - 操作耗时变化
          - 用户放弃率变化
        typical_conclusion: 流程变更增加了/减少了体验摩擦

  - pattern: 底部导航Tab变更
    keywords:
      - 底部导航
      - 新Tab
      - Tab增减
      - 导航栏变化
      - 底部Tab
    hypotheses:
      - name: 功能位置挤压
        description: 新Tab挤占原有Tab的用户流量，尤其关注高消费力Tab的流量变化
        priority: 1
        drill_dimensions:
          - tab_click_uv_distribution
          - squeezed_tab_user_profile
          - tab_uv_delta_quantification
        typical_conclusion: 新Tab挤压了原有高价值Tab的UV，导致消费指标下降
      - name: 高活用户消费潜力浪费
        description: 新功能吸引的用户若为高消费力群体，需估算其留在原场景的机会成本
        priority: 2
        drill_dimensions:
          - new_feature_user_consumption_profile
          - opportunity_cost_estimate
          - user_overlap_analysis
        typical_conclusion: 被分流的高活用户原本可贡献更多消费，机会成本大于新功能收益
      - name: 用户行为流失
        description: 导航结构变化可能导致部分用户困惑或行为减少
        priority: 3
        drill_dimensions:
          - retention_by_segment
          - dau_trend
          - per_user_action_count
        typical_conclusion: 导航变化使部分用户行为频次降低或留存下降
      - name: 分流偏差
        description: 仅在其他假设无法解释时考虑，需AA验证
        priority: 4
        drill_dimensions:
          - aa_baseline
          - srm_check
        typical_conclusion: 实验组与对照组基线存在偏差（需AA数据支撑）
    rules:
      - "当存在功能位置变化时，必须优先验证'功能挤压假设'，不得跳过直接推断分流偏差"
      - "必须列出≥3个竞争假设并用数据逐一验证"
      - "量化归因公式：流失用户数 × 该群体人均消费指标 = 潜在消费损失"

  - pattern: 高活用户分流
    keywords:
      - 高活用户
      - 超级用户
      - 分流
      - 被吸引
      - 高消费力
    hypotheses:
      - name: 机会成本假设
        description: 被分流的高活用户若留在原场景可贡献更多消费
        priority: 1
        drill_dimensions:
          - diverted_user_original_behavior
          - opportunity_cost_calculation
          - consumption_profile_comparison
        typical_conclusion: 被分流用户的消费潜力远高于新功能带来的增量价值
      - name: 生态平衡假设
        description: 高活用户被分流后影响内容生态（如互动减少导致内容质量下降）
        priority: 2
        drill_dimensions:
          - content_interaction_rate_change
          - creator_feedback_metrics
        typical_conclusion: 高活用户分流间接影响了内容生态健康度
    rules:
      - "机会成本估算方法：计算被分流用户若留在原场景的潜在VV/时长贡献"
      - "挤压比例量化：潜在消费损失 / 总消费缺口 = 挤压解释比例"
      - "若解释比例>80%，可认定为主要原因"

