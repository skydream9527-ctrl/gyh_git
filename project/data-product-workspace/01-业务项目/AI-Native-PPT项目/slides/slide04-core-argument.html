<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.tag { display: inline-block; background: #1F2937; padding: 4pt 12pt; border-radius: 3pt; margin-bottom: 10pt; }
.box { background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 18pt 22pt; margin-top: 14pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">01 · 开场</p>
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 16pt 0;">核心论点</h1>
  <div class="box">
    <p style="color: #C9D1D9; font-size: 14pt; margin: 0 0 10pt 0; line-height: 1.6;">从 <span style="color: #58A6FF; font-weight: bold;">需求</span> → <span style="color: #58A6FF; font-weight: bold;">生产过程</span> → <span style="color: #58A6FF; font-weight: bold;">产出</span>，这条链路上的每一个节点，必须做到：</p>
    <ul style="color: #C9D1D9; font-size: 13pt; line-height: 1.8; margin: 8pt 0;">
      <li>具体的、详细的、定义清晰的</li>
      <li>可检验、可修改、可校正</li>
    </ul>
  </div>
  <div style="display: flex; gap: 14pt; margin-top: 18pt;">
    <div style="flex: 1; background: #1A1E26; border-radius: 6pt; padding: 14pt 16pt; border-top: 3pt solid #F85149;">
      <p style="color: #F85149; font-size: 18pt; font-weight: bold; margin: 0 0 4pt 0;">✗</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">拒绝一句话需求</p>
    </div>
    <div style="flex: 1; background: #1A1E26; border-radius: 6pt; padding: 14pt 16pt; border-top: 3pt solid #F85149;">
      <p style="color: #F85149; font-size: 18pt; font-weight: bold; margin: 0 0 4pt 0;">✗</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">没有能解决一切的银弹</p>
    </div>
    <div style="flex: 1; background: #1A1E26; border-radius: 6pt; padding: 14pt 16pt; border-top: 3pt solid #F85149;">
      <p style="color: #F85149; font-size: 18pt; font-weight: bold; margin: 0 0 4pt 0;">✗</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">不存在全知全能的上帝</p>
    </div>
  </div>
</div>
</body></html>
