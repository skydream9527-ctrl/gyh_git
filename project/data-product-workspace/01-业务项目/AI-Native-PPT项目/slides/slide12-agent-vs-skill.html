<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.cols { display: flex; gap: 20pt; margin-top: 14pt; }
.col { flex: 1; }
.card { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 16pt; text-align: center; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">02 · 方法论</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 4pt 0;">Skill 与 Agent 的类比</h1>
  <div class="cols">
    <div class="col">
      <div class="card" style="border-top: 3pt solid #58A6FF;">
        <p style="color: #58A6FF; font-size: 16pt; font-weight: bold; margin: 0 0 10pt 0;">Agent 智能体</p>
        <p style="color: #FFFFFF; font-size: 13pt; margin: 0 0 12pt 0;">= 企业里的员工</p>
        <div style="text-align: left;">
          <ul style="color: #C9D1D9; font-size: 11pt; line-height: 1.8; margin: 0; padding-left: 16pt;">
            <li>有自主决策能力</li>
            <li>能理解目标</li>
            <li>感知环境、规划路径</li>
            <li>应对意外</li>
          </ul>
        </div>
        <div style="background: #0D2137; border-radius: 4pt; padding: 8pt; margin-top: 10pt;">
          <p style="color: #58A6FF; font-size: 10pt; margin: 0;">核心：自主性、决策力</p>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="card" style="border-top: 3pt solid #F0883E;">
        <p style="color: #F0883E; font-size: 16pt; font-weight: bold; margin: 0 0 10pt 0;">Skill 技能</p>
        <p style="color: #FFFFFF; font-size: 13pt; margin: 0 0 12pt 0;">= 员工的工具 / SOP</p>
        <div style="text-align: left;">
          <ul style="color: #C9D1D9; font-size: 11pt; line-height: 1.8; margin: 0; padding-left: 16pt;">
            <li>被动调用</li>
            <li>不会自己启动</li>
            <li>确定性强、标准化</li>
            <li>可复用</li>
          </ul>
        </div>
        <div style="background: #2A1A0E; border-radius: 4pt; padding: 8pt; margin-top: 10pt;">
          <p style="color: #F0883E; font-size: 10pt; margin: 0;">核心：准确性、稳定性</p>
        </div>
      </div>
    </div>
  </div>
  <p style="color: #79C0FF; font-size: 12pt; text-align: center; margin: 12pt 0 0 0;">Agent 是"谁来做"，Skill 是"怎么做"</p>
</div>
</body></html>
