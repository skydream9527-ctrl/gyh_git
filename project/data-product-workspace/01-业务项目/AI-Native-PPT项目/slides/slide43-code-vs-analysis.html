<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 32pt 50pt; width: 620pt; }
.cols { display: flex; gap: 20pt; margin-top: 14pt; }
.col { flex: 1; }
.card { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 16pt 18pt; }
.tag { display: inline-block; border-radius: 4pt; padding: 3pt 10pt; margin-bottom: 10pt; }
</style></head><body>
<div class="wrap">
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 4pt 0;">写代码 vs 做数据分析，哪个更适合 AI？</h1>
  <div style="background: #1A1E26; border-radius: 6pt; padding: 8pt 16pt; margin-top: 6pt;">
    <p style="color: #79C0FF; font-size: 12pt; margin: 0; text-align: center;">直觉上数据分析更容易 → 实际上写代码更容易</p>
  </div>
  <div class="cols">
    <div class="col">
      <div class="card" style="border-top: 3pt solid #F85149;">
        <div class="tag" style="background: #1F0B0B;"><p style="color: #F85149; font-size: 10pt; margin: 0;">看似简单，实则更难</p></div>
        <p style="color: #F85149; font-size: 16pt; font-weight: bold; margin: 0 0 10pt 0;">数据分析</p>
        <div style="margin-bottom: 8pt;">
          <p style="color: #FFFFFF; font-size: 11pt; font-weight: bold; margin: 0 0 4pt 0;">需求模糊 &amp; 开放</p>
          <p style="color: #8B949E; font-size: 10pt; margin: 0;">"分析一下为什么下降了" — 分析什么？从哪个维度？什么口径？</p>
        </div>
        <div>
          <p style="color: #FFFFFF; font-size: 11pt; font-weight: bold; margin: 0 0 4pt 0;">自然语言有理解空间</p>
          <p style="color: #8B949E; font-size: 10pt; margin: 0;">同一句话，不同人理解出不同的分析方向和深度</p>
        </div>
        <div style="background: #1F0B0B; border-radius: 4pt; padding: 6pt 10pt; margin-top: 10pt;">
          <p style="color: #F85149; font-size: 9pt; margin: 0; text-align: center;">模糊性高 → 幻觉风险大 → 结果不可控</p>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="card" style="border-top: 3pt solid #3FB950;">
        <div class="tag" style="background: #0B1F0B;"><p style="color: #3FB950; font-size: 10pt; margin: 0;">看似复杂，实则更适合</p></div>
        <p style="color: #3FB950; font-size: 16pt; font-weight: bold; margin: 0 0 10pt 0;">写代码</p>
        <div style="margin-bottom: 8pt;">
          <p style="color: #FFFFFF; font-size: 11pt; font-weight: bold; margin: 0 0 4pt 0;">编程语言定义清晰</p>
          <p style="color: #8B949E; font-size: 10pt; margin: 0;">语法规则确定、精准无歧义，编译器即验证器</p>
        </div>
        <div>
          <p style="color: #FFFFFF; font-size: 11pt; font-weight: bold; margin: 0 0 4pt 0;">输入输出可验证</p>
          <p style="color: #8B949E; font-size: 10pt; margin: 0;">能运行、能测试、能自动化检查正确性</p>
        </div>
        <div style="background: #0B1F0B; border-radius: 4pt; padding: 6pt 10pt; margin-top: 10pt;">
          <p style="color: #3FB950; font-size: 9pt; margin: 0; text-align: center;">确定性高 → 可验证 → 结果可控</p>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
