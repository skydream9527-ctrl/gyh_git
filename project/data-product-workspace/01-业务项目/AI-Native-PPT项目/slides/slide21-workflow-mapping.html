<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 30pt 40pt; width: 640pt; }
.row { display: flex; }
.cell { padding: 7pt 10pt; border: 1pt solid #21262D; }
.h-cell { background: #1F2937; }
.step-cell { width: 64pt; background: #161B22; }
.act-cell { width: 275pt; background: #0D1B2A; }
.tool-cell { width: 261pt; background: #1A1E26; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 20pt; margin: 0 0 10pt 0;">映射到工作流的每一步</h1>
  <div>
    <div class="row">
      <div class="cell h-cell step-cell"><p style="color: #8B949E; font-size: 9pt; font-weight: bold; margin: 0;">工作流</p></div>
      <div class="cell h-cell act-cell"><p style="color: #8B949E; font-size: 9pt; font-weight: bold; margin: 0;">具体动作</p></div>
      <div class="cell h-cell tool-cell"><p style="color: #8B949E; font-size: 9pt; font-weight: bold; margin: 0;">用什么</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Step 1</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">明确分析框架</p></div>
      <div class="cell tool-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Agent 规划</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Step 2</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">写 SQL 取数</p></div>
      <div class="cell tool-cell"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Skill</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Step 2</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">执行查询返回结果</p></div>
      <div class="cell tool-cell"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Skill</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Step 2</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">决定拆解哪些维度</p></div>
      <div class="cell tool-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Agent 推理</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Step 3</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">关联用户行为 / 市场变化</p></div>
      <div class="cell tool-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Agent 推理</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Step 4</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">找到根因</p></div>
      <div class="cell tool-cell"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Agent 推理</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #F0883E; font-size: 9pt; margin: 0;">Step 5-6</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">根因→策略→产品功能建议</p></div>
      <div class="cell tool-cell"><p style="color: #F0883E; font-size: 9pt; margin: 0;">多 Agent 协同</p></div>
    </div>
    <div class="row">
      <div class="cell step-cell"><p style="color: #F0883E; font-size: 9pt; margin: 0;">Step 7</p></div>
      <div class="cell act-cell"><p style="color: #C9D1D9; font-size: 9pt; margin: 0;">画图画表 / 写飞书 / 整合报告</p></div>
      <div class="cell tool-cell"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Skill + Agent 编排</p></div>
    </div>
  </div>
</div>
</body></html>
