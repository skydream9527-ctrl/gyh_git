<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.quote { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 20pt 24pt; border-left: 4pt solid #F0883E; margin-bottom: 16pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">一句话需求的陷阱</h1>
  <div class="quote">
    <p style="color: #F0883E; font-size: 11pt; margin: 0 0 6pt 0;">老板说：</p>
    <p style="color: #FFFFFF; font-size: 16pt; margin: 0; line-height: 1.5;"><i>"最近的 DAU 有一些异常波动，参考上次的分析做更深入一点的分析。"</i></p>
  </div>
  <div style="display: flex; gap: 10pt;">
    <div style="flex: 1; background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 12pt;">
      <p style="color: #58A6FF; font-size: 11pt; font-weight: bold; margin: 0 0 6pt 0;">DAU 是什么？</p>
      <p style="color: #8B949E; font-size: 9pt; margin: 0; line-height: 1.5;">整体 DAU? 主动启动? Push? 三方调起? 信息流? 搜索?</p>
    </div>
    <div style="flex: 1; background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 12pt;">
      <p style="color: #58A6FF; font-size: 11pt; font-weight: bold; margin: 0 0 6pt 0;">波动是什么？</p>
      <p style="color: #8B949E; font-size: 9pt; margin: 0; line-height: 1.5;">哪几类在波动? 上涨还是下跌? 同向还是反向?</p>
    </div>
    <div style="flex: 1; background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 12pt;">
      <p style="color: #58A6FF; font-size: 11pt; font-weight: bold; margin: 0 0 6pt 0;">上次分析是什么？</p>
      <p style="color: #8B949E; font-size: 9pt; margin: 0; line-height: 1.5;">结论停在哪步? 深入方向? 哪些方向?</p>
    </div>
  </div>
  <div style="background: #1A1E26; border-radius: 6pt; padding: 10pt 18pt; margin-top: 12pt; text-align: center;">
    <p style="color: #F0883E; font-size: 12pt; margin: 0;">→ 与老板交互确认以上信息后，才能开工</p>
  </div>
</div>
</body></html>
