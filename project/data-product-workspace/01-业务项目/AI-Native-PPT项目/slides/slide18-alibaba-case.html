<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.case-box { background: #161B22; border-left: 4pt solid #F0883E; border-radius: 0 6pt 6pt 0; padding: 14pt 18pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">行业类似案例</h1>
  <div class="case-box">
    <p style="color: #F0883E; font-size: 12pt; font-weight: bold; margin: 0 0 8pt 0;">阿里云 2025 云栖大会分享</p>
    <p style="color: #C9D1D9; font-size: 13pt; margin: 0 0 8pt 0; line-height: 1.6;">早期方案中，一次普通的云环境创建交互：</p>
    <div style="display: flex; gap: 20pt; margin: 12pt 0;">
      <div style="text-align: center;">
        <p style="color: #F85149; font-size: 32pt; font-weight: bold; margin: 0;">6 万</p>
        <p style="color: #8B949E; font-size: 10pt; margin: 4pt 0 0 0;">Token 消耗</p>
        <p style="color: #6E7681; font-size: 9pt; margin: 2pt 0 0 0;">相当于写半部《西游记》</p>
      </div>
      <div style="text-align: center;">
        <p style="color: #F85149; font-size: 32pt; font-weight: bold; margin: 0;">&lt;10%</p>
        <p style="color: #8B949E; font-size: 10pt; margin: 4pt 0 0 0;">端到端成功率</p>
      </div>
    </div>
  </div>
  <div style="background: #0D2137; border: 1pt solid #1F4068; border-radius: 6pt; padding: 14pt 18pt; margin-top: 14pt;">
    <p style="color: #58A6FF; font-size: 13pt; font-weight: bold; margin: 0 0 6pt 0;">核心原因</p>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0; line-height: 1.5;">一股脑把模糊需求丢给 AI，没有拆解、没有确认、没有分层</p>
  </div>
</div>
