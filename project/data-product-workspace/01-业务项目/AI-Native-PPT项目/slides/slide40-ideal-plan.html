<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 32pt 50pt; width: 620pt; }
.layers { display: flex; flex-direction: column; gap: 10pt; margin-top: 16pt; }
.layer { display: flex; align-items: center; gap: 14pt; background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 14pt 20pt; }
.icon-box { width: 48pt; height: 48pt; border-radius: 8pt; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="wrap">
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 4pt 0;">我们理想情况下的方案</h1>
  <p style="color: #8B949E; font-size: 11pt; margin: 0;">多层架构 · 各司其职 · 协同完成复杂任务</p>
  <div class="layers">
    <div class="layer" style="border-left: 4pt solid #A371F7;">
      <div class="icon-box" style="background: #1A1030;">
        <p style="color: #A371F7; font-size: 22pt; margin: 0;">1</p>
      </div>
      <div>
        <p style="color: #A371F7; font-size: 16pt; font-weight: bold; margin: 0 0 4pt 0;">一个复杂场景：多 Agent 协同</p>
        <p style="color: #8B949E; font-size: 10pt; margin: 0;">多个 Agent 协作完成端到端的复杂业务流程</p>
      </div>
    </div>
    <div class="layer" style="border-left: 4pt solid #58A6FF;">
      <div class="icon-box" style="background: #0D2137;">
        <p style="color: #58A6FF; font-size: 22pt; margin: 0;">N</p>
      </div>
      <div>
        <p style="color: #58A6FF; font-size: 16pt; font-weight: bold; margin: 0 0 4pt 0;">N 个专业角色：不同角色设定下的 Agent</p>
        <p style="color: #8B949E; font-size: 10pt; margin: 0;">每个 Agent 拥有独立的角色定位、决策能力与上下文</p>
      </div>
    </div>
    <div class="layer" style="border-left: 4pt solid #F0883E;">
      <div class="icon-box" style="background: #2A1A0E;">
        <p style="color: #F0883E; font-size: 22pt; margin: 0;">X</p>
      </div>
      <div>
        <p style="color: #F0883E; font-size: 16pt; font-weight: bold; margin: 0 0 4pt 0;">X 个工具：原子化拆解的 Skill</p>
        <p style="color: #8B949E; font-size: 10pt; margin: 0;">标准化、可复用的原子能力，被 Agent 按需调用</p>
      </div>
    </div>
  </div>
  <div style="background: #0D2137; border-radius: 6pt; padding: 8pt 16pt; margin-top: 12pt; text-align: center;">
    <p style="color: #79C0FF; font-size: 11pt; margin: 0;">1 场景  ×  N 角色  ×  X 工具  =  生产级 AI 系统</p>
  </div>
</div>
</body></html>
