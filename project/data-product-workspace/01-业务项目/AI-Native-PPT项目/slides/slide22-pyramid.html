<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 0; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.pyramid { display: flex; flex-direction: column; align-items: center; gap: 4pt; }
.level { text-align: center; border-radius: 6pt; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 20pt 0;">金字塔框架</h1>
  <div class="pyramid">
    <div class="level" style="width: 200pt; height: 50pt; background: #F0883E;">
      <div>
        <p style="color: #FFFFFF; font-size: 12pt; font-weight: bold; margin: 0;">复杂问题</p>
      </div>
    </div>
    <div class="level" style="width: 300pt; height: 54pt; background: #0D2137; border: 1pt solid #1F4068;">
      <div>
        <p style="color: #F0883E; font-size: 13pt; font-weight: bold; margin: 0;">多 Agent 协同</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 2pt 0 0 0;">跨域决策</p>
      </div>
    </div>
    <div class="level" style="width: 400pt; height: 54pt; background: #161B22; border: 1pt solid #21262D;">
      <div>
        <p style="color: #58A6FF; font-size: 13pt; font-weight: bold; margin: 0;">Agent 层</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 2pt 0 0 0;">思考 & 推理</p>
      </div>
    </div>
    <div class="level" style="width: 500pt; height: 54pt; background: #1A1E26; border: 1pt solid #21262D;">
      <div>
        <p style="color: #79C0FF; font-size: 13pt; font-weight: bold; margin: 0;">Skill 层</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 2pt 0 0 0;">基石能力</p>
      </div>
    </div>
  </div>
  <div style="display: flex; gap: 20pt; margin-top: 18pt;">
    <p style="color: #58A6FF; font-size: 11pt; margin: 0;"><b>1.</b> 识别：哪些用 Agent / Skill</p>
    <p style="color: #79C0FF; font-size: 11pt; margin: 0;"><b>2.</b> 搭建：协作框架</p>
    <p style="color: #F0883E; font-size: 11pt; margin: 0;"><b>3.</b> 执行：逐步完成</p>
  </div>
</div>
</body></html>
