version: "1.0"
description: 数据表清单（唯一权威源）— 表名只在这个文件里维护，SQL 模板用占位符 ${table.<key>} 引用
status: pending_alignment    # 待数据团队提供真实表名后转 active

# ====================================================================
# 怎么用？
# - SQL 模板里写 FROM ${table.search_event}，脚本会自动替换成下面的真实表名
# - 表名变更时，只需要改这个文件的 real_name 字段，其他地方自动同步
# ====================================================================

tables:
  # ---- 主动搜索聚合表 ----
  dm_search_pv_uv:
    real_name: iceberg_zjyprc_hadoop.browser.dm_search_pv_uv_di
    description: 搜索PV/UV聚合表（基于442+418加工，主动搜索指标的首选数据源）
    granularity: 按日+搜索引擎聚合
    partition_field: date
    date_format: YYYYMMDD
    key_fields:
      - { name: date, type: int, desc: 日期分区 }
      - { name: search_engine, type: string, desc: "搜索引擎维度，'ALL'=全量汇总" }
      - { name: active_search_pv, type: double, desc: 全量主动搜索PV }
      - { name: bro_active_search_pv, type: double, desc: 浏览器主动搜索PV }
      - { name: qs_active_search_pv, type: double, desc: 全搜主动搜索PV（端内+端外） }
      - { name: nh_active_search_pv, type: double, desc: NH媒体(内容中心)主动搜索PV }
      - { name: active_search_uv, type: double, desc: 全量主动搜索UV }
      - { name: bro_active_search_uv, type: double, desc: 浏览器主动搜索UV }
      - { name: qs_active_search_uv, type: double, desc: 全搜主动搜索UV }
      - { name: nh_active_search_uv, type: double, desc: NH媒体(内容中心)主动搜索UV }
      - { name: ai_search_uv, type: double, desc: AI搜索UV }
      - { name: bro_ai_search_uv, type: double, desc: 浏览器AI搜索UV }
      - { name: qs_ai_search_uv, type: double, desc: 全搜AI搜索UV }
      - { name: ai_avg_search_uv, type: double, desc: AI人均搜次UV }
      - { name: bro_ai_avg_search_uv, type: double, desc: 浏览器AI人均搜次UV }
      - { name: qs_ai_avg_search_uv, type: double, desc: 全搜AI人均搜次UV }
    used_by_metrics: [active_search_pv, search_penetration, avg_search_per_user]
    status: aligned
    note: "主动搜索指标的首选数据源。基于442（search_security）和418（search）两张打点表加工，已内置渠道归属和版本覆盖率逻辑，无需手动拼接渠道ID或除以0.9。查询时需加 search_engine='ALL' 获取全量。"

  ads_search_intent:
    real_name: iceberg_zjyprc_hadoop.browser.ads_search_intent_dashboard_hot_search_word_dod_metrics_di
    description: 搜索query意图分类表（每条记录=一个query在某天的意图分类和搜索量）
    granularity: 按日+query+意图分类聚合
    partition_field: date
    date_format: YYYYMMDD
    key_fields:
      - { name: date, type: int, desc: 日期分区 }
      - { name: query, type: string, desc: 搜索query文本 }
      - { name: intention_name_result, type: string, desc: 意图分类结果 }
      - { name: intention_name_level_1, type: string, desc: "一级意图分类（医疗健康/科技/影音娱乐/文化/出行/ACGN-游戏/人物/色情等），特殊值：'未匹配内容意图'" }
      - { name: intention_name_level_2, type: string, desc: 二级意图分类（子类） }
      - { name: query_pv, type: bigint, desc: query搜索PV }
      - { name: query_uv, type: bigint, desc: query搜索UV }
      - { name: query_pv_ratio, type: double, desc: query PV占比 }
      - { name: query_pv_dod, type: double, desc: query PV日环比 }
      - { name: query_pv_wow, type: double, desc: query PV周环比 }
      - { name: query_pv_mom, type: double, desc: query PV月环比 }
      - { name: query_pv_7, type: bigint, desc: 最近7天query PV }
      - { name: query_pv_30, type: bigint, desc: 最近30天query PV }
    used_by_metrics: [query_intent_analysis, ctr_by_query_type]
    status: aligned
    note: |
      用于分析用户搜索意图分布和异动。查询时注意过滤掉 '未匹配内容意图' 和 '未匹配领域意图' 的特殊值。
      可按 level_1 聚合得到意图大类分布，按 query 得到热门搜索词，按 level_2 得到细分类别。

  ads_search_intent_level1:
    real_name: iceberg_zjyprc_hadoop.browser.ads_search_intent_dashboard_by_intent_level1_metrics_di
    description: 搜索一级领域意图聚合表（按日+intention_name_level_1+intention_name_result 聚合，每条记录=某意图在某天的搜索量汇总）
    granularity: 按日+一级意图+结果意图聚合
    partition_field: date
    date_format: YYYYMMDD
    key_fields:
      - { name: date, type: int, desc: 日期分区 }
      - { name: intention_name_result, type: string, desc: "结果意图（如：黄页查询、找不合规资源）" }
      - { name: intention_name_level_1, type: string, desc: "一级领域意图（如：医疗健康、科技、影音娱乐、色情等）" }
      - { name: query_pv, type: bigint, desc: 该意图当日搜索PV }
      - { name: query_uv, type: bigint, desc: 该意图当日搜索UV }
      - { name: query_pv_ratio, type: double, desc: 该意图PV占比 }
      - { name: query_pv_7, type: bigint, desc: 该意图近7天PV }
      - { name: query_pv_7_ratio, type: double, desc: 该意图近7天PV占比 }
      - { name: query_pv_30, type: bigint, desc: 该意图近30天PV }
      - { name: query_pv_30_ratio, type: double, desc: 该意图近30天PV占比 }
    used_by_metrics: [query_intent_analysis, intent_trend]
    status: aligned
    note: |
      与 ads_search_intent（query级）的区别：
      - 本表按意图聚合，适合意图分布趋势分析、日周月环比计算
      - ads_search_intent 按 query 聚合，适合热门搜索词排行
      - 本表无内置 dod/wow/mom，环比需要手动对比不同日期（如你的示例 SQL）

  # ---- 搜索行为表 ----
  search_event:
    real_name: iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000442     # ✅ 已对接真实表（浏览器打点事件表）
    description: 搜索行为埋点宽表（每次搜索一行）— 浏览器打点事件表，搜索打点不包含在聚合表 DWDM 层
    granularity: 单次事件行为
    partition_field: date
    date_format: YYYYMMDD                     # 日期分区格式（整型，无分隔符）
    key_fields:
      - { name: date, type: int, desc: 日期分区，YYYYMMDD 整型格式 }
      - { name: distinct_id, type: string, desc: "设备唯一标识（顶层列），所有 UV 去重统一用此字段" }
      - { name: event_name, type: string, desc: "事件名（app_open/search_security/search_resultpage_module_click 等）" }
      - { name: "properties[searchengine_name]", type: string, desc: "搜索引擎名称（baidu/360/douyin），properties MAP 内字段" }
      - { name: "properties[search_source]", type: string, desc: "搜索来源（19种值），properties MAP 内字段" }
      - { name: "properties[search_enter_way]", type: string, desc: "进入搜索方式（8种值），properties MAP 内字段" }
      - { name: "properties[search_way]", type: string, desc: "搜索方式（9种值），properties MAP 内字段" }
      - { name: "properties[from_page]", type: string, desc: "上级页面（browser/search_result），properties MAP 内字段" }
      - { name: "properties[page_type]", type: string, desc: "页面类型（novel/djy_content/game），properties MAP 内字段" }
      - { name: "properties[query]", type: string, desc: "搜索词，properties MAP 内字段" }
      - { name: "properties[searchid]", type: string, desc: "搜索唯一ID，properties MAP 内字段" }
      - { name: "properties[device_id]", type: string, desc: "设备ID（properties内），但 UV 去重请用顶层列 distinct_id" }
    note: 已基于 events.yaml 和实测验证补全关键字段（2026-05-19）
    used_by_metrics: [browser_dau, total_search_pv, search_pv, search_penetration, avg_search_per_user, ctr, click_uv, top_query_concentration, long_tail_query_ratio, search_post_retention]
    status: partial_aligned
    uv_standard:
      field: distinct_id
      access: column（顶层列）
      verified_events: [app_open, search_security]

  search_event_global:
    real_name: iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000418
    description: 全搜端内打点事件表（全搜端内主动搜索数据来源）
    granularity: 单次事件行为
    partition_field: date
    date_format: YYYYMMDD
    key_fields:
      - { name: date, type: int, desc: 日期分区，YYYYMMDD 整型格式 }
      - { name: distinct_id, type: string, desc: 设备唯一标识（顶层列） }
      - { name: event_name, type: string, desc: 事件名（search 等） }
      - { name: "properties[search_source]", type: string, desc: "搜索来源（search_button/sug_word/search_keyboard/search_history/search_engine）" }
    used_by_metrics: [active_search_pv]
    status: aligned
    note: "主动搜索类指标建议使用 dm_search_pv_uv 聚合表，而非直接查询此表。"

  search_result:
    real_name: ods_search_result_di    # ⚠️ 占位名
    description: 搜索结果曝光与点击表（每次结果卡片曝光/点击一行）
    granularity: 单次结果卡片曝光/点击
    partition_field: date
    key_fields:
      - { name: date, type: string }
      - { name: user_id, type: string }
      - { name: query, type: string }
      - { name: scene, type: string }
      - { name: query_type, type: string, desc: 流量分层（head/waist/long_tail） }
      - { name: expose_pv, type: int, desc: 当条曝光次数 }
      - { name: click_pv, type: int, desc: 当条点击次数 }
    used_by_metrics: [ctr, click_uv]
    status: pending_alignment

  # ---- 用户画像维表 ----
  user_profile:
    real_name: dim_user_profile        # ⚠️ 占位名
    description: 用户画像维表（拆解维度依赖）
    granularity: 用户级
    partition_field: date
    key_fields:
      - { name: user_id, type: string }
      - { name: register_date, type: string, desc: 注册日期 }
      - { name: segment, type: string, desc: 新/老用户分群（new/old） }
      - { name: device, type: string, desc: 设备类型（android/ios） }
    used_by_metrics: [ctr, click_uv]   # 用作 JOIN 拆解维度
    used_for_breakdown: [user_segment, device]
    status: pending_alignment

  # ---- 用户活跃表（留存计算依赖） ----
  user_active:
    real_name: ods_user_active_di      # ⚠️ 占位名
    description: 用户日活跃表（用于留存指标计算）
    granularity: 用户日级
    partition_field: date
    key_fields:
      - { name: date, type: string }
      - { name: user_id, type: string }
    used_by_metrics: [search_post_retention]
    status: pending_alignment

  dm_browser_search_core:
    real_name: iceberg_zjyprc_hadoop.browser.dm_browser_search_core_indicators_2022_1d
    description: 浏览器搜索核心指标日聚合表（含搜索留存率）
    granularity: 按日聚合
    partition_field: date
    date_format: YYYYMMDD
    key_fields:
      - { name: date, type: int, desc: 日期分区 }
      - { name: browser_search_retain_2, type: double, desc: 搜索用户次留 }
      - { name: new_browser_search_retain_2, type: double, desc: 搜索新用户次留 }
      - { name: browser_search_retain_7, type: double, desc: 搜索用户7留 }
      - { name: new_browser_search_retain_7, type: double, desc: 搜索新用户7留 }
      - { name: browser_search_retain_30, type: double, desc: 搜索用户30留 }
      - { name: new_browser_search_retain_30, type: double, desc: 搜索新用户30留 }
    used_by_metrics: [weekly_report_search_retention]
    status: aligned
    note: "周报留存指标来源。口径：过去7天日均留存，不包含昨日。"

# ====================================================================
# 表名解析规则（脚本/AI 都按这里来）
# ====================================================================
resolution_rules:
  placeholder_format: "${table.<key>}"   # SQL 模板里这样写
  example: "FROM ${table.search_event}  →  FROM ods_search_event_di"
  resolve_by: scripts/resolve_sql.py     # 脚本会自动替换
  on_unknown_key: fail                    # 遇到未登记的 key 报错，不静默
