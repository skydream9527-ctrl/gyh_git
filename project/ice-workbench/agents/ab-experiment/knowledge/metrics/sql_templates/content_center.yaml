规模指标:
  - name: 内容中心DAU/日活
    sql: |
      SELECT  count(distinct did)
      FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
      WHERE   date=${date-1}
              and is_dau_2024=1

  - name: 内容中心分新老用户DAU/日活
    sql: |
      SELECT  date,
              CASE WHEN is_new_2024=1 THEN 'new'
                   WHEN is_new_2024=0 THEN 'old'
              END as is_new_user,
              count(distinct did)
      FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
      WHERE   date=${date-1}
      GROUP BY date,
               CASE WHEN is_new_2024=1 THEN 'new'
                    WHEN is_new_2024=0 THEN 'old'
               END
    drill_dimension: is_new_user

  - name: 内容中心深度DAU/日活
    sql: |
      SELECT  date, count(distinct did)
      FROM
          (
              SELECT  date, did,
                      sum(app_dura)/60000 as app_dura
              FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
              WHERE   date = ${date-1}
                      and is_app_dau_2024=1
              GROUP BY date, did
          ) a
      WHERE   app_dura>=20
