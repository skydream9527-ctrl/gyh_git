收入指标:
  - name: AB实验收入数据
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#new_home
    description: AB实验场景下的收入对比模板，exp_user侧必须GROUP BY去重避免JOIN放大
    sql: |
      WITH exp_user AS (
          SELECT date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END as exp_group
          FROM iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
          WHERE date = ${date}
              AND is_dau_2024=1
              AND (eid LIKE '%${treatment_id}%' OR eid LIKE '%${control_id}%')
          GROUP BY date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END
      ),
      ad_data AS (
          SELECT date, did,
              SUM(real_fee) as real_fee,
              SUM(valid_view_num) as valid_view_num
          FROM iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
          WHERE date = ${date}
              AND tag_media_type_flag='NEW_HOME'
          GROUP BY date, did
      )
      SELECT e.exp_group,
          COUNT(DISTINCT e.did) as dau,
          SUM(COALESCE(a.real_fee,0))/100000 as revenue_yuan,
          SUM(COALESCE(a.real_fee,0))/100000/COUNT(DISTINCT e.did) as arpu
      FROM exp_user e
      LEFT JOIN ad_data a ON e.date=a.date AND e.did=a.did
      GROUP BY e.exp_group
      ORDER BY e.exp_group
    notes:
      - exp_user CTE必须GROUP BY did去重，因为聚合表每did每天有约48行（按page/module等展开）
      - 收入单位real_fee为"丝"，1元=100000丝，除以100000转元
      - 使用LEFT JOIN确保所有实验用户都被统计（无广告收入的用户贡献0）
      - COALESCE处理NULL值，避免无广告数据的用户被排除

  - name: 内容中心ARPU
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#new_home
    sql: |
      SELECT  a.date,
              SUM(b.real_fee)/100000 AS total_revenue_yuan,
              COUNT(DISTINCT a.did) AS nh_dau,
              SUM(b.real_fee)/100000/COUNT(DISTINCT a.did) AS nh_arpu
      FROM
      (
          SELECT  date, did
          FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
          WHERE   date=${date-1}
                  AND is_dau_2024=1
          GROUP BY date, did
      ) a
      JOIN
      (
          SELECT  date, did,
                  SUM(real_fee) AS real_fee
          FROM    iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
          WHERE   date=${date-1}
                  AND tag_media_type_flag='NEW_HOME'
          GROUP BY date, did
      ) b
      ON a.date=b.date AND a.did=b.did
      GROUP BY a.date

  - name: 内容中心分广告位收入
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#new_home
    sql: |
      SELECT  CASE
                WHEN tag_id IN ('1.132.1.1','1.132.1.2') THEN '首页-推荐'
                WHEN tag_id IN ('1.132.1.3','1.132.1.4') THEN '发现频道Tab'
                WHEN tag_id IN ('1.132.1.6') THEN '游戏频道Tab'
                WHEN tag_id IN ('1.132.1.7','1.132.1.8') THEN '娱乐频道Tab'
                WHEN tag_id IN ('1.132.1.9','1.132.1.10') THEN '其他频道Tab'
                WHEN tag_id IN ('1.132.3.1','1.132.3.2') THEN '视频频道Tab'
                WHEN tag_id IN ('1.132.3.4','1.132.3.5','1.132.3.6','1.132.3.7') THEN '沉浸式详情页'
                WHEN tag_id IN ('1.132.2.1','1.132.2.2','1.132.2.5','1.132.1.14') THEN '图文详情页'
                WHEN tag_id IN ('1.132.3.9','1.132.3.10','1.132.3.11','1.132.3.13') THEN '短剧详情页'
                WHEN tag_id LIKE '1.132.10.%' THEN '任务详情页'
                ELSE '其他'
              END AS scene,
              tag_id,
              SUM(real_fee)/100000 AS revenue_yuan
      FROM    iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
      WHERE   date=${date-1}
              AND tag_media_type_flag='NEW_HOME'
      GROUP BY CASE
                WHEN tag_id IN ('1.132.1.1','1.132.1.2') THEN '首页-推荐'
                WHEN tag_id IN ('1.132.1.3','1.132.1.4') THEN '发现频道Tab'
                WHEN tag_id IN ('1.132.1.6') THEN '游戏频道Tab'
                WHEN tag_id IN ('1.132.1.7','1.132.1.8') THEN '娱乐频道Tab'
                WHEN tag_id IN ('1.132.1.9','1.132.1.10') THEN '其他频道Tab'
                WHEN tag_id IN ('1.132.3.1','1.132.3.2') THEN '视频频道Tab'
                WHEN tag_id IN ('1.132.3.4','1.132.3.5','1.132.3.6','1.132.3.7') THEN '沉浸式详情页'
                WHEN tag_id IN ('1.132.2.1','1.132.2.2','1.132.2.5','1.132.1.14') THEN '图文详情页'
                WHEN tag_id IN ('1.132.3.9','1.132.3.10','1.132.3.11','1.132.3.13') THEN '短剧详情页'
                WHEN tag_id LIKE '1.132.10.%' THEN '任务详情页'
                ELSE '其他'
              END, tag_id
      ORDER BY revenue_yuan DESC
    drill_dimension: scene, tag_id

