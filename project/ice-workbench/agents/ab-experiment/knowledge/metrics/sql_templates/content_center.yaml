下钻模板:
  - name: 底部Tab点击UV分布（实验对比）
    description: 对比实验组/对照组各底部Tab的点击UV分布，用于验证Tab挤压假设
    drill_scenario: 底部导航Tab变更
    sql: |
      WITH daily AS (
          SELECT date,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END as exp_group,
              did
          FROM iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000297
          WHERE date BETWEEN '${start_date}' AND '${end_date}'
              AND event_name = 'tab_bottom_click'
              AND (properties['new_eid'] LIKE '%${treatment_id}%' OR properties['new_eid'] LIKE '%${control_id}%')
      )
      SELECT exp_group,
          properties['tab_name'] as tab_name,
          COUNT(DISTINCT distinct_id) as click_uv
      FROM iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000297 t
      JOIN (SELECT DISTINCT date, did as exp_did, exp_group FROM daily) d
          ON t.date = d.date AND t.distinct_id = d.exp_did
      WHERE t.date BETWEEN '${start_date}' AND '${end_date}'
          AND t.event_name = 'tab_bottom_click'
      GROUP BY exp_group, properties['tab_name']
      ORDER BY exp_group, click_uv DESC
    notes:
      - 明细表用distinct_id做用户ID，非did
      - 实验ID在properties['new_eid']中
      - 需根据实际埋点确认tab_name字段的property key

  - name: 用户分群消费画像
    description: 按是否使用某功能分群，对比各群体的消费指标（VV、时长、消费率）
    drill_scenario: 高活用户分流
    sql: |
      WITH exp_user AS (
          SELECT date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END as exp_group,
              SUM(consum_cnt) as vv,
              SUM(consum_dura)/60000 as consum_dura_min,
              CASE WHEN SUM(consum_cnt) > 0 THEN 1 ELSE 0 END as is_consumer
          FROM iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
          WHERE date BETWEEN '${start_date}' AND '${end_date}'
              AND is_dau_2024 = 1
              AND (eid LIKE '%${treatment_id}%' OR eid LIKE '%${control_id}%')
          GROUP BY date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END
      )
      SELECT exp_group,
          COUNT(DISTINCT did) as dau,
          SUM(is_consumer) as consum_uv,
          CAST(SUM(is_consumer) AS DOUBLE) / COUNT(DISTINCT did) as consum_rate,
          SUM(vv) as total_vv,
          CAST(SUM(vv) AS DOUBLE) / COUNT(DISTINCT did) as vv_per_user,
          SUM(consum_dura_min) / COUNT(DISTINCT did) as consum_dura_per_user
      FROM exp_user
      GROUP BY exp_group
    notes:
      - 聚合表用did做用户ID
      - 聚合表实验字段用eid（非new_eid）
      - 需先GROUP BY did去重（聚合表每did每天多行）

  - name: 功能用户与原有功能用户重叠分析
    description: 分析使用新功能的用户与使用原有功能的用户重叠度
    drill_scenario: 高活用户分流
    sql: |
      WITH new_feature_user AS (
          SELECT DISTINCT distinct_id
          FROM iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000297
          WHERE date BETWEEN '${start_date}' AND '${end_date}'
              AND event_name = '${new_feature_event}'
              AND properties['new_eid'] LIKE '%${treatment_id}%'
      ),
      original_feature_user AS (
          SELECT DISTINCT distinct_id
          FROM iceberg_zjyprc_hadoop.dw.dwd_ot_event_di_31000000297
          WHERE date BETWEEN '${start_date}' AND '${end_date}'
              AND event_name = '${original_feature_event}'
              AND properties['new_eid'] LIKE '%${treatment_id}%'
      )
      SELECT
          (SELECT COUNT(*) FROM new_feature_user) as new_feature_uv,
          (SELECT COUNT(*) FROM original_feature_user) as original_feature_uv,
          (SELECT COUNT(*) FROM new_feature_user a JOIN original_feature_user b ON a.distinct_id = b.distinct_id) as overlap_uv
    notes:
      - ${new_feature_event} 和 ${original_feature_event} 需替换为实际事件名
      - 重叠率 = overlap_uv / new_feature_uv，用于判断新功能是否吸引了原有高活用户
