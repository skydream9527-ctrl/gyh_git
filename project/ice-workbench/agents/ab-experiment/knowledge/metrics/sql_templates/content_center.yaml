留存与LT指标:
  - name: 内容中心次日留存率
    sql: |
      with
          a as (
              SELECT  date, did
              FROM    iceberg_zjyprc_hadoop.newhome.dwm_newhome_event_aggregation_label_di
              WHERE   date between ${date-30} and ${date-1}
                      and is_dau_2024=1
              GROUP BY date, did
          )
      SELECT  a.date,
              count(distinct a.did) as uv,
              count(distinct b.did) as uv_retent,
              count(distinct b.did)/count(distinct a.did) as uv_retent_rate
      FROM
          (
              SELECT  date, did
              FROM    a
          ) a
          left join (
              SELECT  date, did
              FROM    a
          ) b
          on a.did=b.did
          and datediff(FROM_unixtime(unix_timestamp(cast(b.date as string), 'yyyyMMdd'), 'yyyy-MM-dd'), FROM_unixtime(unix_timestamp(cast(a.date as string), 'yyyyMMdd'), 'yyyy-MM-dd'))=1
      GROUP BY a.date;

