  - name: 浏览器信息流分广告位收入
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#browser_feed
    sql: |
      SELECT  CASE
                WHEN tag_id IN ('1.13.c.1','1.13.c.2','1.13.c.23','1.13.c.24') THEN '首页-要闻频道'
                WHEN tag_id IN ('1.13.c.22','1.13.c.7','1.13.c.30') THEN '首页-热点频道Tab'
                WHEN tag_id IN ('1.13.c.3','1.13.c.5') THEN '首页-视频频道Tab'
                WHEN tag_id IN ('1.13.c.8') THEN '首页-娱乐频道Tab'
                WHEN tag_id IN ('1.13.c.12') THEN '首页-体育频道Tab'
                WHEN tag_id IN ('1.13.c.25','1.13.c.26') THEN '首页-本地频道Tab'
                WHEN tag_id IN ('1.13.c.27') THEN '首页-游戏频道Tab'
                WHEN tag_id IN ('1.13.c.11') THEN '首页-军事频道Tab'
                WHEN tag_id IN ('1.13.c.16') THEN '首页-财经频道Tab'
                WHEN tag_id IN ('1.13.c.17') THEN '首页-科技频道Tab'
                WHEN tag_id IN ('1.13.b.5','1.13.b.10') THEN '搜索SUG页'
                WHEN tag_id IN ('1.13.g.4','1.13.g.24','1.13.g.9','1.13.1.4','1.13.9.5') THEN '图文详情页'
                WHEN tag_id IN ('1.13.g.23') THEN '沉浸式详情页'
                WHEN tag_id IN ('1.13.z.1','1.13.z.3') THEN '开屏'
                WHEN tag_id LIKE '1.13.10.%' THEN '任务详情页'
                WHEN tag_id IN ('1.13.1.9','1.13.1.14') THEN '短剧详情页'
                ELSE '其他'
              END AS scene,
              tag_id,
              SUM(real_fee)/100000 AS revenue_yuan
      FROM    iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
      WHERE   date=${date-1}
              AND tag_media_type_flag='BROWSER_FEED'
              AND tag_id IN ('1.13.c.1','1.13.c.2','1.13.c.23','1.13.c.24',
                             '1.13.c.22','1.13.c.7','1.13.c.30',
                             '1.13.c.3','1.13.c.5','1.13.c.8','1.13.c.12',
                             '1.13.c.25','1.13.c.26','1.13.c.27','1.13.c.11',
                             '1.13.c.16','1.13.c.17',
                             '1.13.g.4','1.13.g.24','1.13.g.9','1.13.1.4','1.13.9.5',
                             '1.13.g.23')
      GROUP BY CASE
                WHEN tag_id IN ('1.13.c.1','1.13.c.2','1.13.c.23','1.13.c.24') THEN '首页-要闻频道'
                WHEN tag_id IN ('1.13.c.22','1.13.c.7','1.13.c.30') THEN '首页-热点频道Tab'
                WHEN tag_id IN ('1.13.c.3','1.13.c.5') THEN '首页-视频频道Tab'
                WHEN tag_id IN ('1.13.c.8') THEN '首页-娱乐频道Tab'
                WHEN tag_id IN ('1.13.c.12') THEN '首页-体育频道Tab'
                WHEN tag_id IN ('1.13.c.25','1.13.c.26') THEN '首页-本地频道Tab'
                WHEN tag_id IN ('1.13.c.27') THEN '首页-游戏频道Tab'
                WHEN tag_id IN ('1.13.c.11') THEN '首页-军事频道Tab'
                WHEN tag_id IN ('1.13.c.16') THEN '首页-财经频道Tab'
                WHEN tag_id IN ('1.13.c.17') THEN '首页-科技频道Tab'
                WHEN tag_id IN ('1.13.b.5','1.13.b.10') THEN '搜索SUG页'
                WHEN tag_id IN ('1.13.g.4','1.13.g.24','1.13.g.9','1.13.1.4','1.13.9.5') THEN '图文详情页'
                WHEN tag_id IN ('1.13.g.23') THEN '沉浸式详情页'
                WHEN tag_id IN ('1.13.z.1','1.13.z.3') THEN '开屏'
                WHEN tag_id LIKE '1.13.10.%' THEN '任务详情页'
                WHEN tag_id IN ('1.13.1.9','1.13.1.14') THEN '短剧详情页'
                ELSE '其他'
              END, tag_id
      ORDER BY revenue_yuan DESC
    drill_dimension: scene, tag_id

  - name: 浏览器信息流分启动方式收入
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    sql: |
      SELECT  a.date, a.app_launch_way,
              SUM(b.real_fee)/100000 AS revenue_yuan
      FROM
      (
          SELECT  date, did, app_launch_way
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
          WHERE   date=${date-1}
                  AND is_dau_feed_dapan_2024=1
          GROUP BY date, did, app_launch_way
      ) a
      JOIN
      (
          SELECT  date, did,
                  SUM(real_fee) AS real_fee
          FROM    iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
          WHERE   date=${date-1}
                  AND tag_media_type_flag='BROWSER_FEED'
                  AND tag_id IN ('1.13.c.1','1.13.c.2','1.13.c.23','1.13.c.24',
                                 '1.13.c.22','1.13.c.7','1.13.c.30',
                                 '1.13.c.3','1.13.c.5','1.13.c.8','1.13.c.12',
                                 '1.13.c.25','1.13.c.26','1.13.c.27','1.13.c.11',
                                 '1.13.c.16','1.13.c.17',
                                 '1.13.g.4','1.13.g.24','1.13.g.9','1.13.1.4','1.13.9.5',
                                 '1.13.g.23')
          GROUP BY date, did
      ) b
      ON a.date=b.date AND a.did=b.did
      GROUP BY a.date, a.app_launch_way
      ORDER BY revenue_yuan DESC
    drill_dimension: app_launch_way
