              count(b.date)/count(distinct a.did) LT
      FROM
          (
              SELECT  date, did
              FROM    t1
          ) a
          LEFT JOIN (
              SELECT  date, did
              FROM    t2
          ) b
          on a.did=b.did
      WHERE
          b.date>=a.date
          and datediff(from_unixtime(unix_timestamp(cast(b.date as string), 'yyyyMMdd'), 'yyyy-MM-dd'), from_unixtime(unix_timestamp(cast(a.date as string), 'yyyyMMdd'),'yyyy-MM-dd'))<=29
      GROUP BY a.date

