收入指标:
  - name: AB实验收入
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#browser_feed
    description: AB实验场景下的信息流收入对比模板，exp_user侧必须GROUP BY去重避免JOIN放大
    sql: |
      WITH exp_user AS (
          SELECT date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END as exp_group
          FROM iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
          WHERE date = ${date}
              AND is_dau_feed_dapan_2024=1
              AND (eid LIKE '%${treatment_id}%' OR eid LIKE '%${control_id}%')
          GROUP BY date, did,
              CASE WHEN eid LIKE '%${treatment_id}%' THEN 'treatment'
                   WHEN eid LIKE '%${control_id}%' THEN 'control'
              END
      ),
      ad_data AS (
          SELECT date, did,
              SUM(real_fee) as real_fee,
              SUM(valid_view_num) as valid_view_num
          FROM iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
          WHERE date = ${date}
              AND tag_media_type_flag='BROWSER_FEED'
          GROUP BY date, did
      )
      SELECT e.exp_group,
          COUNT(DISTINCT e.did) as dau,
          SUM(COALESCE(a.real_fee,0))/100000 as revenue_yuan,
          SUM(COALESCE(a.real_fee,0))/100000/COUNT(DISTINCT e.did) as arpu
      FROM exp_user e
      LEFT JOIN ad_data a ON e.date=a.date AND e.did=a.did
      GROUP BY e.exp_group
      ORDER BY e.exp_group
    notes:
      - exp_user CTE必须GROUP BY did去重，因为聚合表每did每天有多行（按维度展开）
      - 收入单位real_fee为"丝"，1元=100000丝，除以100000转元
      - 使用LEFT JOIN确保所有实验用户都被统计（无广告收入的用户贡献0）
      - COALESCE处理NULL值，避免无广告数据的用户被排除

  - name: 浏览器信息流ARPU
    source_table: iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
    scene_mapping_ref: tag_id_scene_mapping.yaml#browser_feed
    sql: |
      SELECT  a.date,
              SUM(b.real_fee)/100000 AS total_revenue_yuan,
              COUNT(DISTINCT a.did) AS feed_dau,
              SUM(b.real_fee)/100000/COUNT(DISTINCT a.did) AS feed_arpu
      FROM
      (
          SELECT  date, did
          FROM    iceberg_zjyprc_hadoop.browser.dwm_browser_event_aggregation_label_di
          WHERE   date=${date-1}
                  AND is_dau_feed_dapan_2024=1
          GROUP BY date, did
      ) a
      JOIN
      (
          SELECT  date, did,
                  SUM(real_fee) AS real_fee
          FROM    iceberg_zjyprc_hadoop.browser.dwm_micd_effect_ad_1d
          WHERE   date=${date-1}
                  AND tag_media_type_flag='BROWSER_FEED'
                  AND tag_id IN ('1.13.c.1','1.13.c.2','1.13.c.23','1.13.c.24',
                                 '1.13.c.22','1.13.c.7','1.13.c.30',
                                 '1.13.c.3','1.13.c.5','1.13.c.8','1.13.c.12',
                                 '1.13.c.25','1.13.c.26','1.13.c.27','1.13.c.11',
                                 '1.13.c.16','1.13.c.17',
                                 '1.13.g.4','1.13.g.24','1.13.g.9','1.13.1.4','1.13.9.5',
                                 '1.13.g.23')
          GROUP BY date, did
      ) b
      ON a.date=b.date AND a.did=b.did
      GROUP BY a.date

