# drill_knowledge.yaml - 下钻推理知识库
#
# 定义常见场景的下钻假设模式
# AI在Step 4中基于此知识库生成下钻假设
#
# 使用方式：Phase 3 Step 4 异常下钻分析

scenarios:
  # ═══════════════════════════════════════
  # 场景1: 新增功能入口
  # ═══════════════════════════════════════
  - pattern: 新增入口/功能
    keywords:
      - 新增
      - 入口
      - 功能
      - 添加
      - 按钮
      - 链接
    confidence: 0.85  # 基础置信度
    
    hypotheses:
      - name: 分流假设
        description: "新入口分流了原有入口/功能的流量"
        confidence: 0.85
        priority: 1  # 最高优先级验证
        drill_dimensions:
          - 各入口点击率（新旧对比）
          - 各入口转化率变化
          - 总点击量是否持平或下降
          - 用户路径变化（从哪来→到哪去）
        expected_evidence_pattern: "旧入口↓ + 新入口↑但总量↓"
        
      - name: 吸引假设
        description: "新入口吸引了低质量/非目标用户"
        confidence: 0.60
        priority: 2
        drill_dimensions:
          - 新入口用户后续行为深度
          - 新老用户分群效果差异
          - 用户留存率对比
          - 人均消费指标对比
        expected_evidence_pattern: "流量↑ but 留存/消费↓"
        
      - name: 布局假设
        description: "新入口改变了页面布局和视觉重心"
        confidence: 0.45
        priority: 3
        drill_dimensions:
          - 各模块停留时长分布
          - 页面滚动深度变化
          - 各区域曝光量变化
          - 视线热力图（如有）
        expected_evidence_pattern: "注意力重新分布"

  # ═══════════════════════════════════════
  # 场景2: UI/样式变更
  # ═══════════════════════════════════════
  - pattern: UI/样式变更
    keywords:
      - 样式
      - UI
      - 布局
      - 改版
      - 视觉
      - 设计
      - 颜色
      - 字体
      - 间距
    confidence: 0.75
    
    hypotheses:
      - name: 注意力假设
        description: "样式变更改变了用户注意力分布"
        confidence: 0.75
        priority: 1
        drill_dimensions:
          - 各模块点击率变化
          - 各区域停留时长
          - CTA按钮转化率
          - 首屏vs非首屏表现
        expected_evidence_pattern: "某些区域↑ 其他区域↓"
        
      - name: 交互假设
        description: "样式变更影响了操作效率"
        confidence: 0.55
        priority: 2
        drill_dimensions:
          - 操作路径长度
          - 完成任务时长
          - 操作成功率
          - 错误/返回率
        expected_evidence_pattern: "效率↓ 或 挫折感↑"
        
      - name: 认知负荷假设
        description: "新版UI增加了用户认知负担"
        confidence: 0.40
        priority: 3
        drill_dimensions:
          - 页面停留时长（过短=困惑，过长=困难）
          - 跳出率
          - 帮助文档查看量
          - 用户反馈关键词
        expected_evidence_pattern: "困惑行为↑"

  # ═══════════════════════════════════════
  # 场景3: 算法/推荐策略变更
  # ═══════════════════════════════════════
  - pattern: 算法/推荐策略变更
    keywords:
      - 算法
      - 推荐
      - 策略
      - 排序
      - 召回
      - 模型
      - 权重
      - 个性化
    confidence: 0.80
    
    hypotheses:
      - name: 质量假设
        description: "新策略导致内容质量分布变化"
        confidence: 0.80
        priority: 1
        drill_dimensions:
          - 内容消费完成率（完播率）
          - 负反馈率（不感兴趣/不喜欢）
          - 内容多样性指数
          - 头部/长尾内容占比
        expected_evidence_pattern: "质量指标↓ 或 分布偏移"
        
      - name: 多样性假设
        description: "新策略改变了内容多样性"
        confidence: 0.65
        priority: 2
        drill_dimensions:
          - 内容品类分布变化
          - 用户探索深度（不同品类数）
          - 重复内容曝光率
          - 发现 vs 消费比例
        expected_evidence_pattern: "多样性↓（信息茧房）or ↑（杂乱）"
        
      - name: 冷启动假设
        description: "新策略对新用户/低活用户效果不同"
        confidence: 0.50
        priority: 3
        drill_dimensions:
          - 新老用户分群效果对比
          - 不同活跃度层级表现
          - 用户生命周期阶段差异
          - 冷启动成功率
        expected_evidence_pattern: "人群效果分化"

  # ═══════════════════════════════════════
  # 场景4: 商业化策略变更
  # ═══════════════════════════════════════
  - pattern: 商业化策略变更
    keywords:
      - 广告
      - 变现
      - 商业化
      - IPU
      - eCPM
      - 广告位
      - 加载
      - 填充
    confidence: 0.78
    
    hypotheses:
      - name: 体验侵蚀假设
        description: "广告加载增加侵蚀了用户体验"
        confidence: 0.82
        priority: 1
        drill_dimensions:
          - 广告请求频率/展示频率
          - 用户停留时长
          - 人均VV
          - 负反馈率
          - 跳过/关闭广告率
        expected_evidence_pattern: "收入↑ but 体验↓"
        
      - name: 广告质量假设
        description: "广告素材/相关性变化影响用户体验"
        confidence: 0.58
        priority: 2
        drill_dimensions:
          - 广告CTR变化
          - 广告类型分布
          - 广告相关性评分
          - 品牌安全指标
        expected_evidence_pattern: "CTR↓ or 相关性↓"
        
      - name: 竞价策略假设
        description: "竞价策略变化导致填充率/eCPM波动"
        confidence: 0.45
        priority: 3
        drill_dimensions:
          - 填充率
          - eCPM分层（不同广告位）
          - 竞争激烈程度指标
          - 广告主数量
        expected_evidence_pattern: "填充率波动大"

  # ═══════════════════════════════════════
  # 场景5: 性能/技术优化
  # ═══════════════════════════════════════
  - pattern: 性能/技术优化
    keywords:
      - 性能
      - 速度
      - 加载
      - 缓存
      - 优化
      - 延迟
      - 卡顿
      - 流畅度
    confidence: 0.70
    
    hypotheses:
      - name: 速度感知假设
        description: "性能提升改善了用户体验和留存"
        confidence: 0.75
        priority: 1
        drill_dimensions:
          - 页面加载时间
          - 首屏时间
          - 操作响应时间
          - 跳出率（加载放弃）
          - 转化漏斗各步骤耗时
        expected_evidence_pattern: "速度↑ + 留存/转化↑"
        
      - name: 兼容性假设
        description: "优化在某些设备/浏览器上产生副作用"
        confidence: 0.50
        priority: 2
        drill_dimensions:
          - 设备型号分群表现
          - OS版本分群表现
          - 浏览器分群表现
          - 网络环境分群表现
        expected_evidence_pattern: "部分设备↓ 整体↑"

# 排除规则（避免错误归因）
exclusion_rules:
  - rule: 外部因素干扰
    conditions:
      - 节假日效应
      - 运营活动影响
      - 竞品动作
      - 行业周期性波动
    action: "先排除外部因素再归因于实验变量"
    
  - rule: 数据异常
    conditions:
      - 埋点故障
      - 数据延迟
      - 样本偏差
    action: "先验证数据准确性再做业务归因"

# 使用说明
usage_notes:
  - 匹配方式: 关键词模糊匹配 + 语义相似度
  - 置信度调整: 匹配到的关键词越多，基础置信度越高
  - 假设生成: 通常生成Top3个最相关的假设
  - 验证优先级: 按priority顺序验证，找到根因后可停止
  - 可扩展: 可根据实际案例持续补充新的场景模式
