# cases_and_lessons.yaml - 案例与经验知识库
#
# 存储历史案例的经验教训
# 用于反馈闭环机制，支持Skill自我进化
#
# 使用方式：反馈闭环阶段

# ═══════════════════════════════════════
# 优质案例（Good Cases）
# ═══════════════════════════════════════
good_cases:
  # 示例案例（可根据实际情况替换）
  - case_id: GC001
    experiment_info:
      control_version: "27.8.0"
      treatment_version: "27.9.0"
      key_variable: "首页推荐算法升级"
      current_phase: "30%"
      analysis_date: "2026-04-15"
      
    result_summary: |
      全部核心指标正向，直接指标符合预期，
      因果链路验证通过。建议全量发布。
      
    performance_metrics:
      positive_core_metrics: 14
      steady_core_metrics: 2
      declined_core_metrics: 0
      combination_type: "全部正向"
      decision: "✅ 全量发布"
      
    drilldown_executed: false  # 无需下钻
    satisfaction: high
    satisfaction_score: 5  # 1-5分
    
    lessons_learned:
      - lesson: 推荐算法升级对消费指标有显著正向作用
        category: 策略有效性
        applicable_scenarios: ["算法优化", "推荐系统升级"]
        
      - lesson: 30%阶段数据稳定时可放心推全
        category: 放量节奏
        applicable_scenarios: ["30%决策判断"]
        
    feedback_from_user: |
      分析非常准确，特别是因果链路验证部分帮助很大。
      决策建议清晰明确，可以直接用于汇报。
      
    created_at: "2026-04-15T10:30:00Z"
    source: user_feedback

# ═══════════════════════════════════════
# 问题案例（Bad Cases）
# ═══════════════════════════════════════
bad_cases:
  # 示例案例（可根据实际情况替换）
  - case_id: BC001
    experiment_info:
      control_version: "27.9.0"
      treatment_version: "28.0.0-beta"
      key_variable: "商业化策略激进调整"
      current_phase: "10%"
      analysis_date: "2026-05-01"
      
    result_summary: |
      此消彼长场景：收入指标显著提升（ARPU+12%），
      但消费指标明显下滑（人均时长-6%，VV-5%）。
      最终决定回滚版本。
      
    performance_metrics:
      positive_core_metrics: 5  # 收入类
      steady_core_metrics: 3
      declined_core_metrics: 8  # 消费类+规模类
      combination_type: "此消彼长"
      decision: "❌ 回滚版本"
      
    drilldown_executed: true
    drilldown_findings:
      root_cause: "广告加载频率过高（+35%），严重侵蚀用户体验"
      hypotheses_tested: 3
      successful_hypothesis: "体验侵蚀假设（置信度92%）"
      
    satisfaction: low
    dissatisfaction_reasons:
      - reason: 初期未及时发现此消彼长的严重性
        severity: high
      - reason: 下钻分析应该在更早阶段触发
        severity: medium
        
    lessons_learned:  # 避坑要点
      - lesson: 商业化策略变更必须同时监控收入和体验指标
        category: 监控盲区
        action: 将消费指标纳入商业化实验的核心监控集
        target_knowledge_base: core_metrics.yaml
        
      - lesson: 此消彼长应在10%阶段就触发人工评估，不要等到30%
        category: 决策时机
        action: 在decision_matrix.yaml的S3场景中强化早期预警
        target_knowledge_base: decision_matrix.yaml
        
      - lesson: 下钻分析中的"体验侵蚀假设"准确率高，应提高默认优先级
        category: 下钻效率
        action: 在drill_knowledge.yaml中将该假设priority从1调整为0（最高）
        target_knowledge_base: drill_knowledge.yaml
        
    improvement_suggestions:
      - suggestion: 增加自动化监控告警，当收入↑且消费↓超过阈值时立即通知
        priority: P0
        effort: 中等
        
      - suggestion: 丰富drill_knowledge中的商业化场景案例
        priority: P1
        effort: 低
        
    feedback_from_user: |
      虽然最终发现了问题，但如果能在10%阶段就给出更强的预警就好了。
      下钻分析很到位，帮助快速定位了根因。
      
    created_at: "2026-05-01T14:20:00Z"
    source: user_feedback

# ═══════════════════════════════════════
# 回写规则配置
# ═══════════════════════════════════════
rewrite_rules:
  # 回写触发条件
  trigger_conditions:
    min_satisfaction_to_extract_lessons: 4  # ≥4分才提取经验
    max_dissatisfaction_to_extract_pitfalls: 2  # ≤2分才提取避坑点
    
  # 回写目标知识库映射
  target_mapping:
    # 从优质案例提取的经验 → 写入这些知识库
    good_case_outputs:
      - target: drill_knowledge.yaml
        extract_field: effective_hypotheses
        action: APPEND_TO_SCENARIOS  # 追加到现有场景
        confirmation_required: true  # 必须用户确认
        
      - target: decision_matrix.yaml
        extract_field: successful_patterns
        action: UPDATE_CONFIDENCE  # 更新模式置信度
        confirmation_required: true
        
      - target: rollout_phases.yaml
        extract_field: optimal_timing
        action: ADD_NOTE  # 添加注释
        confirmation_required: false  # 低风险可不确认
        
    # 从问题案例提取的避坑点 → 写入这些知识库
    bad_case_outputs:
      - target: drill_knowledge.yaml
        extract_field: failed_hypotheses
        action: ADD_EXCLUSION_RULE  # 增加排除规则
        confirmation_required: true
        
      - target: decision_matrix.yaml
        extract_field: edge_cases
        action: ADD_SCENARIO  # 增加边界场景
        confirmation_required: true
        
      - target: core_metrics.yaml
        extract_field: monitoring_gaps
        action: ADD_METRIC  # 补充监控指标
        confirmation_required: true
        
      - target: report_template.yaml
        extract_field: missing_sections
        action: UPDATE_TEMPLATE  # 更新报告模板
        confirmation_required: true

  # 回写格式规范
  format_rules:
    every_entry_must_include:
      - source_case_id: "GCxxx 或 BCxxx"
      - created_at: ISO时间戳
      - contributor: "user/AI"
      - validation_status: pending/confirmed/rejected
      
    quality_checks:
      - no_duplicate_entries: true  # 避免重复写入
      - consistency_check: true  # 与现有条目一致性检查
      - impact_assessment: true  # 评估影响范围

# 统计信息（自动维护）
statistics:
  total_cases: 2
  good_cases: 1
  bad_cases: 1
  average_satisfaction: 3.5
  last_updated: "2026-05-20"

# 使用说明
usage_notes:
  - 本文件是反馈闭环的数据源头
  - 所有经验提炼都应追溯到具体案例（source_case_id）
  - 回写已有知识库前必须用户确认，避免污染
  - 定期review和清理过期案例（建议每季度一次）
  - 可根据需要增加更多维度的分类和标签
