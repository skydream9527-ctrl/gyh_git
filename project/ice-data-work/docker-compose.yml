services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: idw
      POSTGRES_PASSWORD: idw
      POSTGRES_DB: idw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idw"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://idw:idw@postgres:5432/idw
      IDW_BIND_HOST: 0.0.0.0
      IDW_BIND_PORT: "8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # G3 数据 bind mount 到宿主，down 不丢
      - ./agents:/app/agents
      - ./skills:/app/skills
      - ./teams:/app/teams
      - ./users:/app/users
      - ./tasks:/app/tasks
      - ./files:/app/files
      - ./.cache:/app/.cache

volumes:
  pgdata:
