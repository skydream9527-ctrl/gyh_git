<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICE-DATA-WORK · 登录</title>
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px;
      background: radial-gradient(circle at 30% 20%, rgba(30,94,255,.12), transparent 40%), var(--bg); }
    .login-card { width: min(420px, 100%); border: 1px solid var(--line); border-radius: var(--radius-xl); background: #fff; box-shadow: var(--shadow); padding: 30px; }
    .login-card .brand-mark { width: 52px; height: 52px; border-radius: 18px; font-size: 16px; }
    .login-card h1 { font-size: 24px; margin: 16px 0 6px; }
    .field { margin-top: 12px; } .field label { display:block; font-size:12px; color: var(--muted); margin-bottom:6px; }
    .login-card .btn { width: 100%; justify-content: center; margin-top: 14px; }
    .divider { display:flex; align-items:center; gap:10px; color: var(--faint); font-size:12px; margin:18px 0; }
    .divider:before, .divider:after { content:""; height:1px; background: var(--line); flex:1; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-mark">IDW</div>
      <h1>登录 ICE-DATA-WORK</h1>
      <p class="subtle">团队数据工作台 · User → Twin → Agents</p>
      <a class="btn primary" href="workbench.html">使用小米账号登录（飞书）</a>
      <div class="divider">或使用账号密码</div>
      <div class="field"><label>账号</label><input value="admin" /></div>
      <div class="field"><label>密码</label><input type="password" value="admin123" /></div>
      <a class="btn" href="workbench.html">登录并进入 Workbench</a>
      <p class="subtle" style="margin-top:16px;font-size:12px">首次登录将引导你创建数字分身（Twin），并加入团队/项目。</p>
    </div>
  </div>
</body>
</html>
