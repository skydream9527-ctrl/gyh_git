<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.layer { border-radius: 6pt; padding: 12pt 16pt; margin-bottom: 8pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">哪些环节用 AI？怎么用？</h1>
  <div class="layer" style="background: #0D2137; border: 1pt solid #1F4068;">
    <p style="color: #F0883E; font-size: 12pt; font-weight: bold; margin: 0 0 6pt 0;">多 Agent 协同层 — 跨领域、多视角协作的复杂决策</p>
    <p style="color: #8B949E; font-size: 10pt; margin: 0;">原因归因 + 策略制定（可能需要多 Agent 协同）</p>
  </div>
  <div class="layer" style="background: #161B22; border: 1pt solid #21262D;">
    <p style="color: #58A6FF; font-size: 12pt; font-weight: bold; margin: 0 0 6pt 0;">Agent 层 — 需要思考、推理、决策的环节</p>
    <ul style="color: #C9D1D9; font-size: 10pt; line-height: 1.6; margin: 4pt 0; padding-left: 16pt;">
      <li>从数据现象中做基础维度拆解</li>
      <li>拆解数据 → 关联用户行为</li>
      <li>找到原因后 → 关联可干预策略和功能</li>
    </ul>
  </div>
  <div class="layer" style="background: #1A1E26; border: 1pt solid #21262D;">
    <p style="color: #79C0FF; font-size: 12pt; font-weight: bold; margin: 0 0 6pt 0;">Skill 层 — 确定性强、可标准化、可复用的原子能力</p>
    <div style="display: flex; gap: 8pt; flex-wrap: wrap;">
      <div style="background: #21262D; border-radius: 4pt; padding: 6pt 12pt;"><p style="color: #79C0FF; font-size: 10pt; margin: 0;">取数（执行 SQL）</p></div>
      <div style="background: #21262D; border-radius: 4pt; padding: 6pt 12pt;"><p style="color: #79C0FF; font-size: 10pt; margin: 0;">NL-to-SQL</p></div>
      <div style="background: #21262D; border-radius: 4pt; padding: 6pt 12pt;"><p style="color: #79C0FF; font-size: 10pt; margin: 0;">画图画表</p></div>
      <div style="background: #21262D; border-radius: 4pt; padding: 6pt 12pt;"><p style="color: #79C0FF; font-size: 10pt; margin: 0;">写飞书文档</p></div>
    </div>
  </div>
</div>
</body></html>
