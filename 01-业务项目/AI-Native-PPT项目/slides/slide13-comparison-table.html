<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 32pt 50pt; width: 620pt; }
.tbl { width: 100%; border-collapse: collapse; margin-top: 10pt; }
.row { display: flex; }
.cell { padding: 8pt 12pt; border: 1pt solid #21262D; }
.h-cell { background: #1F2937; }
.lbl { width: 90pt; background: #161B22; }
.a-cell { width: 245pt; background: #0D1B2A; }
.s-cell { width: 245pt; background: #1A1E26; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">02 · 方法论</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 12pt 0;">Skill vs Agent 对比矩阵</h1>
  <div>
    <div class="row">
      <div class="cell h-cell lbl"><p style="color: #8B949E; font-size: 10pt; font-weight: bold; margin: 0;">维度</p></div>
      <div class="cell h-cell a-cell"><p style="color: #58A6FF; font-size: 10pt; font-weight: bold; margin: 0;">Agent（智能体）</p></div>
      <div class="cell h-cell s-cell"><p style="color: #F0883E; font-size: 10pt; font-weight: bold; margin: 0;">Skill（技能）</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">类比角色</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">企业中的员工</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">员工用的工具/SOP</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">工作方式</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">主动思考、决策</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">被动调用、按规执行</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">生命周期</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">持续运行，有状态</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">按需加载，用完释放</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">核心价值</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">决策与编排能力</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">标准化与可复用</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">执行模式</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">循环推理+决策+执行</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">线性执行，无状态</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">适用场景</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">开放性、需推理的</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">规则明确、流程固定</p></div>
    </div>
    <div class="row">
      <div class="cell lbl"><p style="color: #8B949E; font-size: 10pt; margin: 0;">上下文消耗</p></div>
      <div class="cell a-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">大（全局状态）</p></div>
      <div class="cell s-cell"><p style="color: #C9D1D9; font-size: 10pt; margin: 0;">小（按需加载）</p></div>
    </div>
  </div>
</div>
</body></html>
