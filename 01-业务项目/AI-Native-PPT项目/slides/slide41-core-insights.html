<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 32pt 50pt; width: 620pt; }
.cards { display: flex; flex-direction: column; gap: 10pt; margin-top: 14pt; }
.card { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 14pt 20pt; display: flex; gap: 16pt; align-items: flex-start; }
.num { min-width: 32pt; height: 32pt; border-radius: 6pt; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="wrap">
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 4pt 0;">核心点提炼</h1>
  <p style="color: #8B949E; font-size: 11pt; margin: 0;">理解 AI 生产力的三个关键认知</p>
  <div class="cards">
    <div class="card" style="border-left: 4pt solid #58A6FF;">
      <div class="num" style="background: #0D2137;"><p style="color: #58A6FF; font-size: 16pt; font-weight: bold; margin: 0;">1</p></div>
      <div>
        <p style="color: #58A6FF; font-size: 14pt; font-weight: bold; margin: 0 0 6pt 0;">上下文 = AI 的技能树</p>
        <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">上下文有限的情况下，技能点不够将技能树点满</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 4pt 0 0 0;">Token 窗口即能力边界，合理分配上下文是核心工程问题</p>
      </div>
    </div>
    <div class="card" style="border-left: 4pt solid #3FB950;">
      <div class="num" style="background: #0B1F0B;"><p style="color: #3FB950; font-size: 16pt; font-weight: bold; margin: 0;">2</p></div>
      <div>
        <p style="color: #3FB950; font-size: 14pt; font-weight: bold; margin: 0 0 6pt 0;">从标准场景到非标场景的渗透</p>
        <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">Code 语言 → 自然语言，AI 生产能力逐步渗透覆盖</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 4pt 0 0 0;">先攻克确定性高的领域，再逐步拓展到模糊场景</p>
      </div>
    </div>
    <div class="card" style="border-left: 4pt solid #F0883E;">
      <div class="num" style="background: #2A1A0E;"><p style="color: #F0883E; font-size: 16pt; font-weight: bold; margin: 0;">3</p></div>
      <div>
        <p style="color: #F0883E; font-size: 14pt; font-weight: bold; margin: 0 0 6pt 0;">确定性 → Skill，不确定性 → Agent</p>
        <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">确定性的执行交给 Skill，不确定性的思考交给 Agent</p>
        <p style="color: #8B949E; font-size: 9pt; margin: 4pt 0 0 0;">分工明确，才能在稳定性和灵活性之间取得平衡</p>
      </div>
    </div>
  </div>
</div>
</body></html>
