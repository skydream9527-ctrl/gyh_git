<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 26pt 50pt; width: 620pt; }
.step { display: flex; align-items: center; gap: 10pt; margin-bottom: 2pt; }
.num { min-width: 24pt; height: 24pt; background: #0D2137; border: 1pt solid #1F4068; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.connector { width: 2pt; height: 4pt; background: #21262D; margin-left: 11pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">03 · 实战案例</p>
  <h1 style="color: #FFFFFF; font-size: 20pt; margin: 0 0 8pt 0;">数据分析的标准工作流</h1>
  <div class="step">
    <div class="num"><p style="color: #58A6FF; font-size: 11pt; margin: 0;">1</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">设立分析框架，验证现象</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #58A6FF; font-size: 11pt; margin: 0;">2</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">基础维度拆解</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #58A6FF; font-size: 11pt; margin: 0;">3</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">数据现象 ↔ 用户行为/市场变化 关联分析</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #79C0FF; font-size: 11pt; margin: 0;">4</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">找到数据变化的真正原因</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #79C0FF; font-size: 11pt; margin: 0;">5</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">原因 ↔ 可干预策略 关联</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #F0883E; font-size: 11pt; margin: 0;">6</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">提出策略和产品功能建议</p>
  </div>
  <div class="connector"></div>
  <div class="step">
    <div class="num"><p style="color: #F0883E; font-size: 11pt; margin: 0;">7</p></div>
    <p style="color: #C9D1D9; font-size: 12pt; margin: 0;">汇总图表、文档，整理完整报告并发出</p>
  </div>
  <div style="display: flex; gap: 8pt; margin-top: 14pt;">
    <div style="background: #0D2137; border-radius: 4pt; padding: 4pt 10pt;"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">Step 1-3: 分析与拆解</p></div>
    <div style="background: #1A2332; border-radius: 4pt; padding: 4pt 10pt;"><p style="color: #79C0FF; font-size: 9pt; margin: 0;">Step 4-5: 归因与策略</p></div>
    <div style="background: #2A1A0E; border-radius: 4pt; padding: 4pt 10pt;"><p style="color: #F0883E; font-size: 9pt; margin: 0;">Step 6-7: 产出与交付</p></div>
  </div>
</div>
</body></html>
