<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.phase { background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 14pt 18pt; margin-bottom: 10pt; display: flex; align-items: flex-start; gap: 14pt; }
.badge { min-width: 60pt; text-align: center; border-radius: 4pt; padding: 4pt 8pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">02 · 方法论</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">三个阶段的范式转移</h1>
  <div class="phase" style="border-left: 4pt solid #8B949E;">
    <div>
      <div class="badge" style="background: #21262D;"><p style="color: #8B949E; font-size: 9pt; margin: 0;">2023-2024</p></div>
    </div>
    <div>
      <p style="color: #FFFFFF; font-size: 13pt; font-weight: bold; margin: 0 0 4pt 0;">阶段一：提示词工程</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">手搓 Prompt · 上下文污染 · 复用性差 · 不稳定</p>
      <p style="color: #6E7681; font-size: 9pt; margin: 4pt 0 0 0;">行业评价："草莽时代"</p>
    </div>
  </div>
  <div class="phase" style="border-left: 4pt solid #58A6FF;">
    <div>
      <div class="badge" style="background: #0D2137;"><p style="color: #58A6FF; font-size: 9pt; margin: 0;">2024-2025</p></div>
    </div>
    <div>
      <p style="color: #FFFFFF; font-size: 13pt; font-weight: bold; margin: 0 0 4pt 0;">阶段二：Agent + Skill 分层</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">MCP 协议统一工具接入 · Agent Skills 标准化封装</p>
      <p style="color: #58A6FF; font-size: 9pt; margin: 4pt 0 0 0;">Token 消耗降低 60%-80%</p>
    </div>
  </div>
  <div class="phase" style="border-left: 4pt solid #F0883E;">
    <div>
      <div class="badge" style="background: #2A1A0E;"><p style="color: #F0883E; font-size: 9pt; margin: 0;">2025-至今</p></div>
    </div>
    <div>
      <p style="color: #FFFFFF; font-size: 13pt; font-weight: bold; margin: 0 0 4pt 0;">阶段三：Harness Engineering / 上下文工程</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">关注点分离 · 规划→推理→执行三层解构</p>
      <p style="color: #F0883E; font-size: 9pt; margin: 4pt 0 0 0;">"模型决定跳多高，知识与架构决定走多远"</p>
    </div>
  </div>
</div>
</body></html>
