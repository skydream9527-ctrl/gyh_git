<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 32pt 50pt; width: 620pt; }
.row { display: flex; }
.cell { padding: 9pt 12pt; border: 1pt solid #21262D; }
.h-cell { background: #1F2937; }
.dim { width: 90pt; background: #161B22; }
.a-cell { width: 245pt; background: #1C1226; }
.b-cell { width: 245pt; background: #0D2617; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">05 · Case 展示</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">预期对比维度</h1>
  <div>
    <div class="row">
      <div class="cell h-cell dim"><p style="color: #8B949E; font-size: 11pt; font-weight: bold; margin: 0;">维度</p></div>
      <div class="cell h-cell a-cell"><p style="color: #F85149; font-size: 11pt; font-weight: bold; margin: 0;">一股脑</p></div>
      <div class="cell h-cell b-cell"><p style="color: #3FB950; font-size: 11pt; font-weight: bold; margin: 0;">拆解四步</p></div>
    </div>
    <div class="row">
      <div class="cell dim"><p style="color: #8B949E; font-size: 11pt; margin: 0;">准确性</p></div>
      <div class="cell a-cell"><p style="color: #F85149; font-size: 11pt; margin: 0;">低</p></div>
      <div class="cell b-cell"><p style="color: #3FB950; font-size: 11pt; margin: 0;">高</p></div>
    </div>
    <div class="row">
      <div class="cell dim"><p style="color: #8B949E; font-size: 11pt; margin: 0;">可解释性</p></div>
      <div class="cell a-cell"><p style="color: #F85149; font-size: 11pt; margin: 0;">黑盒</p></div>
      <div class="cell b-cell"><p style="color: #3FB950; font-size: 11pt; margin: 0;">每步可查</p></div>
    </div>
    <div class="row">
      <div class="cell dim"><p style="color: #8B949E; font-size: 11pt; margin: 0;">可修正性</p></div>
      <div class="cell a-cell"><p style="color: #F85149; font-size: 11pt; margin: 0;">只能重来</p></div>
      <div class="cell b-cell"><p style="color: #3FB950; font-size: 11pt; margin: 0;">可以回溯修正</p></div>
    </div>
    <div class="row">
      <div class="cell dim"><p style="color: #8B949E; font-size: 11pt; margin: 0;">可复用性</p></div>
      <div class="cell a-cell"><p style="color: #F85149; font-size: 11pt; margin: 0;">无</p></div>
      <div class="cell b-cell"><p style="color: #3FB950; font-size: 11pt; margin: 0;">Skill 可复用</p></div>
    </div>
    <div class="row">
      <div class="cell dim"><p style="color: #8B949E; font-size: 11pt; margin: 0;">稳定性</p></div>
      <div class="cell a-cell"><p style="color: #F85149; font-size: 11pt; margin: 0;">波动大</p></div>
      <div class="cell b-cell"><p style="color: #3FB950; font-size: 11pt; margin: 0;">稳定可预期</p></div>
    </div>
  </div>
</div>
</body></html>
