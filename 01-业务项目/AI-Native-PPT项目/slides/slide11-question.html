<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.box { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 20pt; text-align: center; }
.q { background: #0D2137; border: 1pt solid #1F4068; border-radius: 6pt; padding: 12pt 16pt; margin-top: 12pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">02 · 方法论</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">方案与问题</h1>
  <div class="box">
    <p style="color: #C9D1D9; font-size: 14pt; margin: 0; line-height: 1.6;">用<span style="font-weight: bold; color: #58A6FF;">工程化</span>的方式去思考一个具体的复杂问题</p>
    <p style="color: #C9D1D9; font-size: 14pt; margin: 6pt 0 0 0; line-height: 1.6;">拆解到用 <span style="font-weight: bold; color: #58A6FF;">Agent + Skill</span> 去组合解决</p>
  </div>
  <div style="display: flex; gap: 12pt; margin-top: 18pt;">
    <div class="q" style="flex: 1;">
      <p style="color: #79C0FF; font-size: 13pt; font-weight: bold; margin: 0 0 6pt 0;">什么问题适合 Skill？</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">确定性强、可标准化</p>
    </div>
    <div class="q" style="flex: 1;">
      <p style="color: #58A6FF; font-size: 13pt; font-weight: bold; margin: 0 0 6pt 0;">什么问题适合 Agent？</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">需推理、决策</p>
    </div>
    <div class="q" style="flex: 1;">
      <p style="color: #F0883E; font-size: 13pt; font-weight: bold; margin: 0 0 6pt 0;">什么问题适合多 Agent？</p>
      <p style="color: #8B949E; font-size: 10pt; margin: 0;">跨领域、多视角</p>
    </div>
  </div>
</div>
</body></html>
