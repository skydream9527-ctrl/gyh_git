<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">02 · 方法论</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">什么时候用什么？— 适合 Agent</h1>
  <div class="card" style="border-left: 4pt solid #58A6FF;">
    <p style="color: #58A6FF; font-size: 14pt; font-weight: bold; margin: 0 0 10pt 0;">适合 Agent 的特征</p>
    <ul style="color: #C9D1D9; font-size: 11pt; line-height: 1.7; margin: 0; padding-left: 16pt;">
      <li><span style="color: #3FB950;">✓</span> 需要理解意图和上下文</li>
      <li><span style="color: #3FB950;">✓</span> 需要规划和拆解任务</li>

    </ul>
  </div>
  <div class="card" style="border-left: 4pt solid #F0883E;">

      <li><span style="color: #3FB950;">✓</span> 跨领域、跨专业</li>

  <div style="display: flex; gap: 10pt;">

    <div style="background: #21262D; border-radius: 4pt; padding: 8pt 14pt;"><p style="color: #58A6FF; font-size: 10pt; margin: 0;">策略推理</p></div>
    <div style="background: #21262D; border-radius: 4pt; padding: 8pt 14pt;"><p style="color: #F0883E; font-size: 10pt; margin: 0;">归因 + 策略 + 竞品对比</p></div>
  </div>
