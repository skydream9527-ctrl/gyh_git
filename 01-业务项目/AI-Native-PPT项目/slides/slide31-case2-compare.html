<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.cols { display: flex; gap: 16pt; }
.col { flex: 1; }
.card { background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 16pt; height: 220pt; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">05 · Case 展示</p>
  <h1 style="color: #FFFFFF; font-size: 22pt; margin: 0 0 14pt 0;">Case 2：一股脑 vs 拆解四步</h1>
  <div class="cols">
    <div class="col">
      <div class="card" style="border-top: 3pt solid #F85149;">
        <p style="color: #F85149; font-size: 14pt; font-weight: bold; margin: 0 0 12pt 0;">方式 A：一股脑抛给 AI</p>
        <ul style="color: #C9D1D9; font-size: 10pt; line-height: 1.8; margin: 0; padding-left: 14pt;">
          <li>一句话需求直接丢给 AI</li>
          <li>期望 AI 一次性给出答案</li>
          <li>无法检验中间过程</li>
          <li>结果不可控、不可复现</li>
        </ul>
        <div style="background: #1C1226; border-radius: 4pt; padding: 10pt; margin-top: 14pt; text-align: center;">
          <p style="color: #F85149; font-size: 14pt; font-weight: bold; margin: 0;">结果：?</p>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="card" style="border-top: 3pt solid #3FB950;">
        <p style="color: #3FB950; font-size: 14pt; font-weight: bold; margin: 0 0 12pt 0;">方式 B：拆成四个步骤</p>
        <ul style="color: #C9D1D9; font-size: 10pt; line-height: 1.8; margin: 0; padding-left: 14pt;">
          <li>Step 1: 明确问题 &amp; 拆解</li>
          <li>Step 2: 逐步取数 &amp; 分析</li>
          <li>Step 3: 关联归因 &amp; 推理</li>
          <li>Step 4: 策略建议 &amp; 报告</li>
        </ul>
        <div style="background: #0D2617; border-radius: 4pt; padding: 10pt; margin-top: 14pt; text-align: center;">
          <p style="color: #3FB950; font-size: 14pt; font-weight: bold; margin: 0;">结果：?</p>
        </div>
      </div>
    </div>
  </div>
  <p style="color: #F0883E; font-size: 12pt; text-align: center; margin: 10pt 0 0 0;">→ 现场演示两种方式的差异和效果对比</p>
</div>
</body></html>
