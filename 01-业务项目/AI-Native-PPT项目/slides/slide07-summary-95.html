<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 0; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.bar-outer { width: 480pt; height: 40pt; background: #161B22; border-radius: 6pt; overflow: hidden; display: flex; margin-bottom: 12pt; }
.bar-eng { background: #58A6FF; display: flex; align-items: center; justify-content: center; }
.bar-llm { background: #F0883E; display: flex; align-items: center; justify-content: center; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">01 · 开场</p>
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 24pt 0;">一句话总结</h1>
  <div style="background: #161B22; border: 1pt solid #21262D; border-radius: 8pt; padding: 24pt 40pt; text-align: center; width: 500pt;">
    <p style="color: #C9D1D9; font-size: 16pt; margin: 0 0 20pt 0; line-height: 1.6;">生产级 AI Agent 的落地</p>
    <div class="bar-outer">
      <div class="bar-eng" style="width: 456pt;"><p style="color: #FFFFFF; font-size: 13pt; font-weight: bold; margin: 0;">95% 工程能力</p></div>
      <div class="bar-llm" style="width: 24pt;"></div>
    </div>
    <div style="display: flex; width: 480pt; justify-content: space-between;">
      <p style="color: #58A6FF; font-size: 10pt; margin: 2pt 0 0 0;">工程体系</p>
      <p style="color: #F0883E; font-size: 10pt; margin: 2pt 0 0 0;">5% LLM</p>
    </div>
    <p style="color: #F0883E; font-size: 15pt; font-weight: bold; margin: 18pt 0 0 0;">只有 5% 来自 LLM 与 Prompt 本身</p>
  </div>
</div>
</body></html>
