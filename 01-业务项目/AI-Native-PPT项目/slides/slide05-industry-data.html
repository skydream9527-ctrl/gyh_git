<!DOCTYPE html>
<html><head><style>
html { background: #0D1117; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; background-image: url('bg-dark.png'); background-size: cover; }
.wrap { margin: 36pt 50pt; width: 620pt; }
.stat { display: flex; gap: 14pt; margin-top: 16pt; }
.card { flex: 1; background: #161B22; border: 1pt solid #21262D; border-radius: 6pt; padding: 16pt; text-align: center; }
.big { color: #F0883E; font-size: 28pt; font-weight: bold; }
</style></head><body>
<div class="wrap">
  <p style="color: #58A6FF; font-size: 11pt; margin: 0 0 6pt 0;">01 · 开场</p>
  <h1 style="color: #FFFFFF; font-size: 24pt; margin: 0 0 6pt 0;">行业数据佐证</h1>
  <p style="color: #8B949E; font-size: 10pt; margin: 0 0 10pt 0;">数据来源：中国信通院《智能体技术和应用研究报告2025》、麦肯锡</p>
  <div class="stat">
    <div class="card">
      <p class="big" style="margin: 0 0 6pt 0;">90%+</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">AI Agent 项目停留在</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">"好看的 Demo" 阶段</p>
    </div>
    <div class="card">
      <p class="big" style="margin: 0 0 6pt 0;">64%</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">中国企业已在测试</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">或计划部署 AI 智能体</p>
    </div>
    <div class="card">
      <p class="big" style="margin: 0 0 6pt 0;">44.8%</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">Agent 市场年复合增长率</p>
      <p style="color: #C9D1D9; font-size: 11pt; margin: 0;">2024: $51亿 → 2030: $471亿</p>
    </div>
  </div>
  <div style="background: #161B22; border-left: 4pt solid #F0883E; border-radius: 0 6pt 6pt 0; padding: 14pt 20pt; margin-top: 18pt;">
    <p style="color: #F0883E; font-size: 12pt; font-weight: bold; margin: 0 0 4pt 0;">核心瓶颈</p>
    <p style="color: #C9D1D9; font-size: 13pt; margin: 0;">缺乏系统性的工程化落地框架 —— 从 Demo 到生产的鸿沟</p>
  </div>
</div>
</body></html>
