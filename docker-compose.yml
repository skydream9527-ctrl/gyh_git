# ICE Data Workbench — 自托管 compose 文件
# 详细说明：docs/SELF_HOSTING.md
#
# 首次起：cp .env.example .env  # 必改 ICE_SECRET_KEY 和 LLM key
#         docker compose up -d --build
# 升级：  git pull && docker compose up -d --build
# 数据全部 bind mount 到宿主目录，docker compose down 不会丢数据。

services:
  ice-workbench:
    build: .
    image: ice-workbench:latest
    container_name: ice-workbench
    restart: unless-stopped

    # 单端口同时跑 SPA + API + WebSocket。改宿主端口在 .env 里设 ICE_BIND_PORT
    ports:
      - "${ICE_BIND_PORT:-8000}:8000"

    # .env 整份注入；ICE_WORKERS 单独走 environment 是为了在 .env 没设时给一个
    # 比 Makefile prod-run（4 worker）更小的容器默认值
    env_file: .env
    environment:
      - ICE_WORKERS=${ICE_WORKERS:-2}

    # 全部 bind mount 到宿主当前目录。ls/grep/tar 都能直接看，符合 G3 文件优先。
    # docker compose down 不会删，docker compose down -v 也不会删（-v 只对 named volume）
    volumes:
      - ./users:/app/users
      - ./tasks:/app/tasks
      - ./files:/app/files
      - ./agents:/app/agents
      - ./skills:/app/skills
      - ./.cache:/app/.cache
      # .env 也挂进去，保证容器内 backend/app/core/config.py 读的 .env 和宿主一致
      - ./.env:/app/.env:ro

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
