# decision_matrix.yaml - 决策矩阵
#
# 定义SOP对齐的放量决策规则
# 核心原则：此消彼长必须人工决策
#
# 使用方式：Phase 4 决策建议

matrix:
  # ═══════════════════════════════════════
  # 场景S1: 最理想状态
  # ═══════════════════════════════════════
  - id: S1
    scenario_name: 全部正向 + 符合预期
    core_metrics_pattern: 全部正向
    direct_metrics_pattern: 符合预期
    causal_validated: true  # 可选，因果链路验证通过更好
    
    decision: "✅ 建议继续放量或全量发布"
    decision_emoji: "✅"
    requires_human_confirm: true  # 仍需人工确认
    requires_human_decision: false  # 系统可以给出明确建议
    auto_action: RECOMMEND  # 推荐而非强制
    
    reasoning: |
      所有核心指标均正向提升，直接指标符合预期，
      实验效果显著且可靠。因果链路验证通过，
      确认增长来源于实验变量。
    
    confidence_score: 0.95  # 建议置信度95%
    
    next_actions:
      - 根据当前阶段决定下一步（进入下一阶段或直接推全）
      - 如在30%阶段且数据优异，可直接推全
      - 继续保持日常监控

  # ═══════════════════════════════════════
  # 场景S2: 可以接受的状态
  # ═══════════════════════════════════════
  - id: S2
    scenario_name: 部分正向+部分平稳 + 符合预期
    core_metrics_pattern: 部分正向+部分平稳
    direct_metrics_pattern: 符合预期
    causal_validated: true
    
    decision: "✅ 建议继续放量"
    decision_emoji: "✅"
    requires_human_confirm: true
    requires_human_decision: false
    auto_action: RECOMMEND
    
    reasoning: |
      核心指标无恶化，部分指标正向提升，其余保持平稳。
      直接指标符合预期，说明变量生效正常。
      整体属于健康状态，可以继续放量观察。
    
    confidence_score: 0.85
    
    next_actions:
      - 进入下一阶段继续观察
      - 关注平稳指标是否有改善趋势
      - 延长观察期以确保稳定性

  # ═══════════════════════════════════════
  # 场景S3: 此消彼长 ⚠️ 关键场景
  # ═══════════════════════════════════════
  - id: S3
    scenario_name: 此消彼长（A升B降）
    core_metrics_pattern: 此消彼长
    direct_metrics_pattern: "*"  # 任意
    causal_validated: "*"
    
    decision: "⚠️ 需人工评估此消彼长"
    decision_emoji: "⚠️"
    requires_human_confirm: true
    requires_human_decision: true  # ⛔ 必须人工决策！
    auto_action: PAUSE  # 自动暂停，等待人工输入
    
    reasoning: |
      检测到此消彼长情况：部分核心指标提升，但另一些下降。
      这是最复杂的决策场景，系统无法自动判断是否接受这种权衡。
      需要从多维度评估后由人工拍板。
    
    confidence_score: 0.0  # 系统不给置信度，完全依赖人工判断
    
    # 人工评估维度（必须回答的问题）
    evaluation_dimensions:
      - dimension: 下降指标的严重程度
        question: 下降指标是否触及业务红线？是否会影响核心KPI？
        options:
          - label: 严重影响
            weight: 3
            implication: 可能导致整体目标失败
          - label: 中等影响
            weight: 2
            implication: 需要关注但不致命
          - label: 轻微影响
            weight: 1
            implication: 在可接受范围内
          - label: 可接受
            weight: 0
            implication: 正常波动范围
            
      - dimension: 提升指标的业务价值
        question: 提升指标带来的收益是否足以覆盖下降造成的损失？
        options:
          - label: 远超损失
            weight: 3
            implication: 收益远大于代价
          - label: 基本持平
            weight: 2
            implication: 收支平衡
          - label: 略低于损失
            weight: 1
            implication: 得不偿失
          - label: 明显不足
            weight: 0
            implication: 负面效应
            
      - dimension: 长期可持续性
        question: 这种此消彼长的趋势是否可持续？还是短期效应？
        options:
          - label: 可持续
            weight: 3
            implication: 长期维持
          - label: 可能持续
            weight: 2
            implication: 需持续观察
          - label: 不确定
            weight: 1
            implication: 难以预测
          - label: 短期效应
            weight: 0
            implication: 用户会逐渐流失
    
    # 最终人工选择项
    human_choices:
      - choice: 接受此消彼长，继续放量
        condition: 综合评估正面
        follow_up: 设置监控指标，定期回顾
        
      - choice: 有条件接受（需监控下降指标）
        condition: 收益略大于成本
        follow_up: 设置止损线，触发自动告警
        
      - choice: 不接受，暂停放量并回滚版本
        condition: 成本大于收益或风险过高
        follow_up: 分析原因，优化方案后重试
        
      - choice: 需要更多数据再决定
        condition: 无法判断
        follow_up: 延长观察期至14天，收集更多数据

  # ═══════════════════════════════════════
  # 场景S4: 出现下降 ❌
  # ═══════════════════════════════════════
  - id: S4
    scenario_name: 核心指标出现下降
    core_metrics_pattern: 出现下降
    direct_metrics_pattern: "*"
    causal_validated: "*"
    
    decision: "❌ 建议暂不放量，先进行下钻分析"
    decision_emoji: "❌"
    requires_human_confirm: true
    requires_human_decision: false  # 系统明确建议不放量
    auto_action: RECOMMEND_WITH_DRILLDOWN  # 建议并自动触发下钻
    
    reasoning: |
      核心指标出现下降，违反护栏规则。
      无论直接指标如何，都必须先定位原因。
      已自动触发Step 4下钻分析，待根因明确后再做决策。
    
    confidence_score: 0.90  # 对"暂不放量"这个建议很确定
    
    next_actions:
      - 等待Step 4下钻分析完成
      - 审查下钻报告中的问题定位
      - 根据根因决定：修复问题后重试 or 放弃该改动

  # ═══════════════════════════════════════
  # 场景S5: 直接指标不符合预期
  # ═══════════════════════════════════════
  - id: S5
    scenario_name: 直接指标不符合预期
    core_metrics_pattern: "*"
    direct_metrics_pattern: 不符合预期
    causal_validated: "*"
    
    decision: "❌ 建议暂不放量，变量可能未生效或有副作用"
    decision_emoji: "❌"
    requires_human_confirm: true
    requires_human_decision: false
    auto_action: RECOMMEND_WITH_DRILLDOWN
    
    reasoning: |
      直接指标不符合预期，说明：
      ① 变量可能未真正生效（技术问题）
      ② 变量产生了非预期的副作用
      ③ 预期的因果链路不存在
      
      即使核心指标暂时看起来不错，也不能贸然放量，
      因为增长来源不明或不可持续。
    
    confidence_score: 0.85
    
    next_actions:
      - 检查变量实现是否正确（技术排查）
      - 执行下钻分析，寻找真正的影响因素
      - 评估是否需要调整实验设计

# 特殊规则集
special_rules:
  # 免AA实验的特殊注意事项
  exemption_aa_note: >
    当前为免AA实验，已额外关注数据基线稳定性。
    如果数据存在异常波动，可能需要延长观察期。
    
  # 多需求打包的特殊处理
  multi_requirement_note: >
    如果一个版本包含多个需求改动，且出现混合信号，
    建议拆分验证各需求的独立贡献（如有条件）。

# 决策矩阵版本信息
version: "1.0"
last_updated: "2026-05-20"
